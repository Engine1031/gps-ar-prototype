    viewState.headingSource = "Android 絕對方位 (deviceorientationabsolute)";
    viewState.headingIsFallback = false;
  }

  function orientationHandler(e) {
    if (typeof e.webkitCompassHeading === "number" && !isNaN(e.webkitCompassHeading)) {
      viewState.gotIosCompass = true;
      viewState.compassAccuracy = (typeof e.webkitCompassAccuracy === "number" && e.webkitCompassAccuracy >= 0)
        ? e.webkitCompassAccuracy : null;
      pushHeadingSample(e.webkitCompassHeading, "ios");
      viewState.headingSource = "iOS 羅盤 (webkitCompassHeading)";
      viewState.headingIsFallback = false;
      return;
    }
    if (viewState.gotAbsolute) return; // absolute event already provides heading
    if (e.alpha === null || e.alpha === undefined) return;
    pushHeadingSample(e.alpha, "fallback");
    viewState.headingSource = "⚠️ 非絕對方位 (deviceorientation alpha)";
    viewState.headingIsFallback = true;
  }

  function attachOrientationListeners() {
    if (viewState.orientationHandlersAttached) return;
    window.addEventListener("deviceorientationabsolute", absoluteOrientationHandler);
    window.addEventListener("deviceorientation", orientationHandler);
    viewState.orientationHandlersAttached = true;
  }

  function detachOrientationListeners() {
    if (!viewState.orientationHandlersAttached) return;
    window.removeEventListener("deviceorientationabsolute", absoluteOrientationHandler);
    window.removeEventListener("deviceorientation", orientationHandler);
    viewState.orientationHandlersAttached = false;
  }

  function startOrientation() {
    var hasIosPermissionApi = typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function";
    if (hasIosPermissionApi) {
      // 必須在使用者按鈕點擊事件中直接呼叫，不能自動觸發
      DeviceOrientationEvent.requestPermission().then(function (state) {
        if (state === "granted") {
          attachOrientationListeners();
        } else {
          viewState.headingSource = "羅盤權限被拒絕";
        }
      }).catch(function (err) {
        viewState.headingSource = "羅盤權限請求錯誤: " + err.message;
      });
    } else {
      attachOrientationListeners();
    }
  }

  function startCamera() {
    return navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    }).then(function (stream) {
      viewState.stream = stream;
      video.srcObject = stream;
      return video.play();
    });
  }

  // 檢視模式的目前位置平滑 —— 跟登記模式同一套反變異數加權平均邏輯(weightedAverageSamples)，
  // 但不能像登記模式等好幾秒，而是用「最近 N 筆的滑動視窗」即時平滑，站著不動時能濾掉
  // GPS 原始讀數的小幅跳動；如果新讀數距離目前平滑值太遠，視為使用者真的移動了一大段，
  // 直接清空緩衝區重新累積，避免平滑造成「明明走過去了畫面還顯示很遠」的延遲感。
  function updateLivePosition(rawSample) {
    if (viewState.positionBuffer.length > 0) {
      var currentAvg = weightedAverageSamples(viewState.positionBuffer);
      var jumpDist = haversineDistance(currentAvg.lat, currentAvg.lng, rawSample.lat, rawSample.lng);
      if (jumpDist > LIVE_POSITION_JUMP_THRESHOLD_M) {
        viewState.positionBuffer = [];
      }
    }

    viewState.positionBuffer.push(rawSample);
    if (viewState.positionBuffer.length > LIVE_POSITION_SMOOTHING_WINDOW) {
      viewState.positionBuffer.shift();
    }

    var smoothed = weightedAverageSamples(viewState.positionBuffer);
    viewState.currentPosition = { lat: smoothed.lat, lng: smoothed.lng, accuracy: smoothed.accuracy };
  }

  function startGeoWatch() {
    if (!("geolocation" in navigator)) {
      diagnostics.textContent = "此裝置/瀏覽器不支援 GPS 定位";
      return;
    }
    viewState.watchId = navigator.geolocation.watchPosition(
      function (pos) {
        updateLivePosition({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy,
          timestamp: pos.timestamp
        });
      },
      function (err) {
        diagnostics.textContent = "GPS 錯誤: " + err.message + " (code " + err.code + ")";
      },
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
    );
  }

  function ensureMarkerEl(point) {
    var el = viewState.markerEls[point.id];
    if (!el) {
      el = document.createElement("div");
      el.className = "marker";
      el.dataset.pointId = point.id;
      // 調整3: 點擊標籤看詳情。因標籤重疊時會垂直錯開成不重疊，點擊命中的就是螢幕上那一個。
      el.addEventListener("click", function () {
        if (el.dataset.pointId) openArDetail(el.dataset.pointId);
      });
      overlayLayer.appendChild(el);
      viewState.markerEls[point.id] = el;
    }
    return el;
  }

  function cleanupMarkerEls(validIds) {
    Object.keys(viewState.markerEls).forEach(function (id) {
      if (validIds.indexOf(id) === -1) {
        overlayLayer.removeChild(viewState.markerEls[id]);
        delete viewState.markerEls[id];
      }
    });
  }

  function updateAR() {
    var points = loadPoints();
    var fov = parseFloat(fovInput.value);
    if (!fov || isNaN(fov)) fov = 65;
    fov = Math.max(20, Math.min(120, fov));
    var halfFov = fov / 2;
    // 調整2(v2): 最大顯示距離門檻(可調，即時生效)
    var maxDist = parseFloat(maxDistInput.value);
    if (!maxDist || isNaN(maxDist) || maxDist <= 0) maxDist = MAX_DISPLAY_DISTANCE_M;

    orientationWarning.style.display = viewState.headingIsFallback ? "block" : "none";

    // 修正2(v2.4): 微調期間用凍結的基準位置，否則用即時平滑位置。整個 AR 計算都以 basePos 為準。
    var basePos = viewState.frozenPosition || viewState.currentPosition;

    var diagLines = [];
    diagLines.push("=== 診斷資訊 ===");
    if (basePos) {
      diagLines.push("GPS: " + basePos.lat.toFixed(6) + ", " + basePos.lng.toFixed(6) +
        "  accuracy: ±" + basePos.accuracy.toFixed(1) + "m" +
        (viewState.frozenPosition ? "  (微調凍結)" : ""));
    } else {
      diagLines.push("GPS: 尚未取得定位");
    }
    diagLines.push("方位角: " + (viewState.currentHeading != null ? viewState.currentHeading.toFixed(1) + "°" : "N/A") +
      "  來源: " + viewState.headingSource);
    diagLines.push("羅盤精度: " + (viewState.compassAccuracy != null ? "±" + viewState.compassAccuracy.toFixed(1) + "°" : "無法取得"));
    diagLines.push("FOV: " + fov + "° (±" + halfFov + "°)");
    diagLines.push("--- 標記點 (" + points.length + ") ---");

    var validIds = [];
    var entries = [];

    // 第一階段：計算每個點的方位角/距離/相對夾角(先不動 DOM)，並產生每點的診斷行。
    points.forEach(function (p) {
      validIds.push(p.id);
      ensureMarkerEl(p); // 確保元素存在(供分群時取用/隱藏)
      var regAccuracyText = "登記時精度 ±" + (p.accuracy != null ? p.accuracy.toFixed(1) : "?") + "m";

      if (!basePos || viewState.currentHeading == null) {
        diagLines.push(p.label + ": 等待 GPS/方位資料... (" + regAccuracyText + ")");
        return;
      }

      // 調整1(v2.5): 正在微調的點用暫存座標(尚未寫入 localStorage)計算，讓標籤即時反映調整
      var plat = p.lat, plng = p.lng;
      if (viewState.nudgeBuffer && viewState.nudgeBuffer.pointId === p.id) {
        plat = viewState.nudgeBuffer.lat; plng = viewState.nudgeBuffer.lng;
      }
      var dist = haversineDistance(
        basePos.lat, basePos.lng, plat, plng
      );
      var brg = bearingTo(
        basePos.lat, basePos.lng, plat, plng
      );
      var rel = normalizeRelative(brg, viewState.currentHeading);
      var inFov = Math.abs(rel) <= halfFov;
      var withinMax = dist <= maxDist;
      // 調整8/修正3: 全域篩選(顏色/地標) —— 只疊加通過篩選的地標(不影響診斷列表)
      var passFilter = !filterIsActive() || pointPassesFilter(p);
      var inView = inFov && withinMax && passFilter;
      var xPercent = 50 + (rel / halfFov) * 50;

      entries.push({ p: p, dist: dist, brg: brg, rel: rel, inView: inView, xPercent: xPercent });
      // 診斷仍列出所有點(含超過顯示距離的)，方便使用者知道它存在
      diagLines.push(
        p.label + ": bearing=" + brg.toFixed(1) + "° dist=" + dist.toFixed(1) + "m rel=" + rel.toFixed(1) +
        "° inFOV=" + (inFov ? "YES" : "no") + (withinMax ? "" : " (超過顯示距離)") + " (" + regAccuracyText + ")"
      );
    });

    // 先把所有單點標籤元素隱藏，稍後只顯示「單點群組」用到的那些
    Object.keys(viewState.markerEls).forEach(function (id) { viewState.markerEls[id].style.display = "none"; });

    // 調整2：密度分群 —— 依相對夾角排序，相鄰夾角差 < DENSITY_GROUP_ANGLE_THRESHOLD 的點歸為同群
    var visible = entries.filter(function (e) { return e.inView; });
    visible.sort(function (a, b) { return a.rel - b.rel; });
    var nudgeId = viewState.nudgeBuffer ? viewState.nudgeBuffer.pointId : null;
    var groups = [];
    visible.forEach(function (e) {
      var last = groups[groups.length - 1];
      // 調整1(v2.5): 正在微調的點不併入群組，永遠自成一個單點單位(才能套用「選定中」特效)
      var eIsNudge = nudgeId != null && e.p.id === nudgeId;
      var lastIsNudge = last && nudgeId != null && last[last.length - 1].p.id === nudgeId;
      if (!eIsNudge && !lastIsNudge && last && (e.rel - last[last.length - 1].rel) < DENSITY_GROUP_ANGLE_THRESHOLD) {
        last.push(e);
      } else {
        groups.push([e]);
      }
    });

    // 每個群組成一個「渲染單位」，位置取群組成員的水平平均
    var units = groups.map(function (g) {
      var meanX = g.reduce(function (s, e) { return s + e.xPercent; }, 0) / g.length;
      return { members: g, xPercent: meanX, verticalOffset: 0 };
    });

    // 修正3/調整2：對「渲染單位」(單點或群組)依水平位置做碰撞錯開，逐級往下堆疊避免彼此重疊
    units.sort(function (a, b) { return a.xPercent - b.xPercent; });
    var prevX = null, stackLevel = 0;
    units.forEach(function (u) {
      if (prevX !== null && Math.abs(u.xPercent - prevX) < LABEL_COLLISION_THRESHOLD_PERCENT) stackLevel += 1;
      else stackLevel = 0;
      u.verticalOffset = stackLevel * LABEL_COLLISION_OFFSET_PX;
      prevX = u.xPercent;
    });

    // 渲染：單點群組用該點自己的標籤元素(含距離分級)，多點群組用群組元素池
    var groupIndex = 0;
    units.forEach(function (u) {
      var topCss = "calc(42% + " + u.verticalOffset + "px)";
      if (u.members.length === 1) {
        var e = u.members[0];
        var el = viewState.markerEls[e.p.id];
        // 調整1(v2.5): 正在微調的點加「選定中」脈動高亮特效
        var nudgeCls = (nudgeId != null && e.p.id === nudgeId) ? " marker-nudging" : "";
        el.className = "marker " + distanceClass(e.dist) + nudgeCls; // 調整1: 距離分級
        el.style.left = u.xPercent + "%";
        el.style.top = topCss;
        el.style.display = "flex";
        el.innerHTML = "<span class='marker-label'>" + escapeHtml(e.p.label) + "</span>" +
          "<span class='marker-dist'>" + e.dist.toFixed(1) + " m</span>";
      } else {
        var gel = ensureGroupEl(groupIndex++);
        gel._groupMemberIds = u.members.map(function (m) { return m.p.id; });
        gel.style.left = u.xPercent + "%";
        gel.style.top = topCss;
        gel.style.display = "flex";
        gel.innerHTML = "<span class='marker-label'>📍 此方向</span>" +
          "<span class='marker-dist'>" + u.members.length + " 個點</span>";
      }
    });
    // 隱藏本幀沒用到的群組元素
    for (var gi = groupIndex; gi < viewState.groupEls.length; gi++) viewState.groupEls[gi].style.display = "none";
    diagLines.push("--- 顯示單位: " + units.length + " (畫面內 " + visible.length + " 點) ---");

    cleanupMarkerEls(validIds);

    // 調整2: 群組清單彈窗開啟時，即時更新每個成員的距離
    if (viewState.openGroupMemberIds) {
      viewState.openGroupMemberIds.forEach(function (id) {
        var item = arGroupListBody.querySelector("[data-point-id='" + id + "']");
        if (!item) return;
        var span = item.querySelector(".group-list-dist");
        var m = entries.filter(function (e) { return e.p.id === id; })[0];
        if (span) span.textContent = (m && basePos) ? m.dist.toFixed(1) + " m" : "無法計算";
      });
    }

    // 調整3: 詳情卡片打開期間，背景標籤持續更新，卡片上的「目前距離」也一起即時更新
    if (viewState.openDetailPointId != null) {
      var distEl = document.getElementById("arDetailDist");
      if (distEl) {
        var match = entries.filter(function (e) { return e.p.id === viewState.openDetailPointId; })[0];
        distEl.textContent = (match && basePos) ? match.dist.toFixed(1) + " m" : "無法計算";
      }
    }

    // 調整5: 位置微調專注模式 —— 面板上的即時距離
    if (viewState.nudgeFocusPointId != null) {
      var fDistEl = document.getElementById("arNudgeFocusDist");
      if (fDistEl) {
        var fbuf = viewState.nudgeBuffer; // 調整1(v2.5): 用暫存座標算距離
        if (fbuf && basePos) {
          fDistEl.textContent = haversineDistance(basePos.lat, basePos.lng, fbuf.lat, fbuf.lng).toFixed(1) + " m";
        } else fDistEl.textContent = "無法計算";
      }
    }

    diagnostics.innerHTML = diagLines.map(escapeHtml).join("\n");
  }

  // 修正1：畫面重繪節流 —— 用 rAF 迴圈持續跑，但每 AR_RENDER_THROTTLE_MS 才真正執行一次 updateAR()。
  // 羅盤事件觸發頻率很高，但只更新 viewState.currentHeading 這個變數本身(見 orientationHandler)，
  // 實際重繪畫面(含診斷區塊、標籤位置)則由這個節流後的迴圈驅動，避免每次事件都整個重繪。
  function arRenderLoop(now) {
    if (now - viewState.lastRenderTime >= AR_RENDER_THROTTLE_MS) {
      viewState.lastRenderTime = now;
      updateAR();
    }
    viewState.rafId = requestAnimationFrame(arRenderLoop);
  }

  function startViewMode() {
    diagWrap.classList.remove("open"); // 修正6: 每次進 AR 預設收合診斷區塊
    diagToggle.textContent = "▸ 診斷資訊";
    diagnostics.textContent = "啟動相機/GPS/羅盤中...";
    startOrientation(); // 必須直接在點擊事件呼叫鏈內，不能延遲到 promise 之後
    startGeoWatch();
    startCamera().then(function () {
      startOverlay.style.display = "none";
      viewState.lastRenderTime = 0;
      if (viewState.rafId) cancelAnimationFrame(viewState.rafId);
      viewState.rafId = requestAnimationFrame(arRenderLoop);
    }).catch(function (err) {
      diagnostics.textContent = "相機啟動失敗: " + err.message;
    });
  }

  function stopViewMode() {
    if (viewState.stream) {
      viewState.stream.getTracks().forEach(function (t) { t.stop(); });
      viewState.stream = null;
    }
    video.srcObject = null;
    if (viewState.watchId != null) {
      navigator.geolocation.clearWatch(viewState.watchId);
      viewState.watchId = null;
    }
    if (viewState.rafId) {
      cancelAnimationFrame(viewState.rafId);
      viewState.rafId = null;
    }
    viewState.lastRenderTime = 0;
    detachOrientationListeners();
    viewState.currentPosition = null;
    viewState.positionBuffer = [];
    viewState.currentHeading = null;
    viewState.headingSource = "尚無方位資料";
    viewState.headingIsFallback = false;
    viewState.headingBuffer = [];
    viewState.headingSourceKey = null;
    viewState.compassAccuracy = null;
    viewState.gotAbsolute = false;
    viewState.gotIosCompass = false;
    Object.keys(viewState.markerEls).forEach(function (id) {
      overlayLayer.removeChild(viewState.markerEls[id]);
    });
    viewState.markerEls = {};
    viewState.groupEls.forEach(function (el) { if (el.parentNode) overlayLayer.removeChild(el); }); // 調整2: 清群組元素
    viewState.groupEls = [];
    closeArDetail();     // 離開檢視模式時關閉詳情卡片
    closeGroupList();    // 調整2: 關閉群組清單
    closeRenameModal();  // 調整4: 關閉改名稱輸入框
    closeArNudgeFocus(); // 調整5: 關閉位置微調專注面板
    startOverlay.style.display = "flex";
    diagnostics.textContent = "初始化中...";
  }

  btnStartView.addEventListener("click", startViewMode);
  btnBack.addEventListener("click", function () { switchTab("register"); });
  btnBackFromStart.addEventListener("click", function () { switchTab("register"); });

  // ===================== 地圖預覽 =====================
  // 檢視 + 量測 + 編輯：讀取 localStorage 登記點做視覺化；編輯模式可拖曳修正座標，
  // lat/lng 為「目前生效座標」(AR 檢視/量測都讀它)，originalLat/originalLng 保留 GPS 原始值，
  // editHistory 記錄每次人工修正供回溯。
  var btnRefreshMapLocation = document.getElementById("btnRefreshMapLocation");
  var btnToggleMeasureMode = document.getElementById("btnToggleMeasureMode");
  var btnClearMeasure = document.getElementById("btnClearMeasure");
  var btnToggleEditMode = document.getElementById("btnToggleEditMode");
  var btnSelectRecent = document.getElementById("btnSelectRecent");
  var btnToggleCluster = document.getElementById("btnToggleCluster");
  var mapStatus = document.getElementById("mapStatus");
  var measureResultBar = document.getElementById("measureResultBar");

  var leafletMap = null;
  var mapMarkersLayer = null;
  var mapLinesLayer = null;   // 調整4(v2): 父子虛線連線(不聚合)
  var mapCurrentLocationMarker = null;
  var mapAutoFetchedLocationOnce = false;
  var clusterModeActive = false; // 調整3(v2): 聚合顯示開關(僅當次瀏覽有效，不存 localStorage)

  // 新增B(v3): 有在場貨物的 marker —— 藍底 + 📦 徽章 + 數量
  function cargoIconWithCount(n) {
    return L.divIcon({
      className: "cargo-marker",
      html: "<div class='cargo-marker-inner'><span class='cargo-count'>" + n + "</span></div>",
      iconSize: [26, 26], iconAnchor: [13, 13]
    });
  }
  // 依點的狀態回傳預設(未選取)圖示：有在場貨物→貨物徽章，否則一般藍色 marker
  function defaultIconFor(points, p) {
    if (hasActiveCargo(p)) return cargoIconWithCount(visibleCargoCount(p));
    return new L.Icon.Default();
  }

  // 調整2: 量測模式狀態
  var measureModeActive = false;
  var mapMarkerRefs = [];       // {point, marker} 供選取樣式套用與模式切換重繪
  var measureFirstPoint = null; // 目前選取的量測起點 {point, marker}
  var measureActiveMarkers = []; // 目前套用「已選取」圖示的 marker，供清除時還原成預設圖示
  var measureLine = null;       // 兩點間的量測連線 (L.Polyline)
  var measureSelectedIcon = L.divIcon({
    className: "measure-selected-icon",
    html: "<div class='measure-selected-icon-inner'></div>",
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });

  // 編輯模式狀態
  var editModeActive = false;
  var editSelectedIds = []; // 已選取(可拖曳)的登記點 id 集合
  var editSelectedIcon = L.divIcon({
    className: "edit-selected-icon",
    html: "<div class='edit-selected-icon-inner'></div>",
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });

  // 調整3(v2): 依聚合開關建立 markers 圖層(cluster group 或一般 layer group)
  function buildMarkersLayer() {
    if (!clusterModeActive) return L.layerGroup();
    // 點聚合圓圈 → 顯示清單彈窗(每個地標 + 在場貨物摘要)，取代預設縮放
    var cg = L.markerClusterGroup({ zoomToBoundsOnClick: false, spiderfyOnMaxZoom: false, showCoverageOnHover: false });
    cg.on("clusterclick", function (e) {
      var points = loadPoints();
      var children = e.layer.getAllChildMarkers();
      var wrap = document.createElement("div");
      var h = document.createElement("div");
      h.className = "group-list-header";
      h.textContent = "此聚合內 " + children.length + " 個地標";
      wrap.appendChild(h);
      children.forEach(function (m) {
        var p = byId(points, m._pointId);
        if (!p) return;
        var row = document.createElement("div");
        row.className = "cluster-list-item";
        row.innerHTML = "<b>" + escapeHtml(p.label) + "</b><br>" +
          "<span class='cluster-cargo'>📦 " + escapeHtml(cargoSummary(p)) + "</span>";
        wrap.appendChild(row);
      });
      L.popup({ maxHeight: 300 }).setLatLng(e.latlng).setContent(wrap).openOn(leafletMap);
    });
    return cg;
  }

  function initMapIfNeeded() {
    if (leafletMap) return;
    leafletMap = L.map("leafletMap", { attributionControl: true }).setView(DEFAULT_MAP_CENTER, 15);
    var tileLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: MAP_MAX_ZOOM,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(leafletMap);
    mapLinesLayer = L.layerGroup().addTo(leafletMap); // 父子虛線(永遠不聚合)
    mapMarkersLayer = buildMarkersLayer().addTo(leafletMap);

    // 調整1: 偏僻地點常常在高 zoom 等級沒有圖磚資料(伺服器回404觸發 tileerror)，
    // 累積同一 zoom 等級的失敗次數，超過門檻就自動退回上一級，不讓畫面卡在空白/模糊狀態。
    var tileErrorCounts = {};
    tileLayer.on("tileerror", function () {
      var z = leafletMap.getZoom();
      tileErrorCounts[z] = (tileErrorCounts[z] || 0) + 1;
      if (tileErrorCounts[z] >= MAP_TILE_ERROR_THRESHOLD && z > leafletMap.getMinZoom()) {
        leafletMap.setZoom(z - 1);
      }
    });
    leafletMap.on("zoomstart", function () {
      tileErrorCounts = {};
    });
  }

  // 調整2: 量測模式下點擊 marker 不開彈出視窗，改成選取量測起點/終點。
  function onMapMarkerClick(point, marker) {
    if (!measureModeActive) return;
    if (measureFirstPoint && measureFirstPoint.point.id === point.id) return; // 同一點不重複處理

    if (!measureFirstPoint) {
      // 需求2: 上一輪量測已結束(或還沒開始)時點任一 marker，都視為開始新一輪，先清掉舊的連線/選取樣式
      clearMeasurementVisuals();
      measureFirstPoint = { point: point, marker: marker };
      marker.setIcon(measureSelectedIcon);
      measureActiveMarkers.push(marker);
      measureResultBar.textContent = "量測模式：已選「" + point.label + "」，請點選第二個登記點...";
      measureResultBar.style.display = "block";
      return;
    }

    var first = measureFirstPoint;
    var dist = haversineDistance(first.point.lat, first.point.lng, point.lat, point.lng);
    measureLine = L.polyline(
      [[first.point.lat, first.point.lng], [point.lat, point.lng]],
      { color: "#ffcc00", weight: 3, dashArray: "6,8" }
    ).addTo(leafletMap);
    measureLine.bindTooltip(dist.toFixed(1) + " m", {
      permanent: true, direction: "center", className: "measure-distance-tooltip"
    }).openTooltip();
    marker.setIcon(measureSelectedIcon);
    measureActiveMarkers.push(marker);
    measureResultBar.textContent = first.point.label + " → " + point.label + "：" + dist.toFixed(1) + " 公尺";
    measureResultBar.style.display = "block";
    measureFirstPoint = null; // 回到「等待下一輪新起點」狀態；下次點擊任一 marker 即開始新一輪量測
  }

  // 需求2: 清除所有選取樣式與量測結果(切換量測模式開關、按下清除按鈕、或重新進入頁籤時呼叫)
  function clearMeasurementVisuals() {
    measureActiveMarkers.forEach(function (m) { m.setIcon(new L.Icon.Default()); });
    measureActiveMarkers = [];
    if (measureLine) {
      leafletMap.removeLayer(measureLine);
      measureLine = null;
    }
    measureFirstPoint = null;
    measureResultBar.textContent = "";
    measureResultBar.style.display = "none";
  }

  // 與編輯模式互斥：開啟其中一個會自動關閉另一個(關閉方向不會反向觸發，不會遞迴)
  function setMeasureMode(active) {
    if (active && editModeActive) setEditMode(false);
    measureModeActive = active;
    clearMeasurementVisuals();
    renderMapMarkers(); // 重繪以依模式重新綁定 popup(量測模式下 marker 不綁 popup)
    btnToggleMeasureMode.textContent = measureModeActive ? "📏 量測模式：開啟" : "📏 量測模式：關閉";
    btnClearMeasure.style.display = measureModeActive ? "inline-block" : "none";
    if (measureModeActive) {
      measureResultBar.textContent = "量測模式：請點選第一個登記點...";
      measureResultBar.style.display = "block";
    }
  }

  // ---------- 編輯模式 ----------
  function isPointEdited(p) {
    return !!(p.editHistory && p.editHistory.length > 0);
  }

  function editedFlagText(p) {
    var last = p.editHistory[p.editHistory.length - 1];
    return "已人工修正（最後修正: " + new Date(last.editedAt).toLocaleString() + "）";
  }

  function setEditMode(active) {
    if (active && measureModeActive) setMeasureMode(false);
    editModeActive = active;
    editSelectedIds = [];
    if (!editModeActive) closeOffsetPanel(); // 調整4(v2): 關掉編輯模式時收起偏移面板
    renderMapMarkers();
    btnToggleEditMode.textContent = editModeActive ? "✏️ 編輯模式：開啟" : "✏️ 編輯模式：關閉";
    btnSelectRecent.style.display = editModeActive ? "inline-block" : "none";
    if (editModeActive) {
      measureResultBar.textContent = "編輯模式：點擊登記點選取/取消，拖曳已選取的點可批次移動";
      measureResultBar.style.display = "block";
    } else {
      measureResultBar.textContent = "";
      measureResultBar.style.display = "none";
    }
  }

  // 依 editSelectedIds 套用選取樣式與可拖曳狀態(只有已選取的 marker 可拖曳)
  function applySelectionVisuals() {
    var points = loadPoints();
    mapMarkerRefs.forEach(function (ref) {
      var selected = editSelectedIds.indexOf(ref.point.id) !== -1;
      // 未選取時還原成該點角色對應的圖示(子點橘/父點金星/獨立藍)，而非一律預設藍
      ref.marker.setIcon(selected ? editSelectedIcon : defaultIconFor(points, ref.point));
      if (ref.marker.dragging) {
        if (selected && editModeActive) ref.marker.dragging.enable();
        else ref.marker.dragging.disable();
      }
    });
  }

  function updateEditStatusBar() {
    measureResultBar.textContent = editSelectedIds.length > 0
      ? "編輯模式：已選取 " + editSelectedIds.length + " 筆，拖曳任一選取點可批次移動"
      : "編輯模式：點擊登記點選取/取消，拖曳已選取的點可批次移動";
    measureResultBar.style.display = "block";
  }

  function onEditMarkerClick(point, marker) {
    if (!editModeActive) return;
    var idx = editSelectedIds.indexOf(point.id);
    if (idx === -1) editSelectedIds.push(point.id);
    else editSelectedIds.splice(idx, 1);
    applySelectionVisuals();
    updateEditStatusBar();
    // 新增A(v3): 點任一 marker 都顯示 8 方向微調面板(選取後才是最新那點)
    if (editSelectedIds.indexOf(point.id) !== -1) openOffsetPanel(point.id);
    else closeOffsetPanel(); // 取消選取該點則收起面板
  }

  function selectRecentPoints() {
    var sorted = loadPoints().slice().sort(function (a, b) {
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    editSelectedIds = sorted.slice(0, RECENT_SELECT_COUNT).map(function (p) { return p.id; });
    applySelectionVisuals();
    measureResultBar.textContent = "編輯模式：已選取最近 " + editSelectedIds.length + " 筆，拖曳任一選取點可批次移動";
    measureResultBar.style.display = "block";
  }

  // 拖曳放開 → 確認後才寫入 localStorage；取消則從 localStorage 重繪，所有 marker 彈回原位
  function onEditMarkerDragEnd(point, marker) {
    if (!editModeActive || editSelectedIds.indexOf(point.id) === -1) {
      renderMapMarkers();
      return;
    }
    var target = marker.getLatLng();
    var points = loadPoints();
    var selected = points.filter(function (p) { return editSelectedIds.indexOf(p.id) !== -1; });

    // 修正3(v2.4): 單點自由拖曳微調不跳確認框 —— 直接即時寫入座標與 editHistory，
    // 以「事後可還原」(還原上一步/還原 GPS 原始位置)取代「每次都確認」。維持選取讓使用者能連續拖曳。
    if (selected.length === 1) {
      var sp = selected[0];
      if (sp.originalLat == null || sp.originalLng == null) {
        sp.originalLat = sp.lat;
        sp.originalLng = sp.lng;
      }
      if (!sp.editHistory) sp.editHistory = [];
      sp.editHistory.push({ editedAt: new Date().toISOString(), fromLat: sp.lat, fromLng: sp.lng, toLat: target.lat, toLng: target.lng });
      sp.lat = target.lat;
      sp.lng = target.lng;
      savePoints(points);
      renderMapMarkers(); // 保留 editSelectedIds，重繪後該 marker 仍為選取狀態、可繼續拖曳
      if (offsetPanelPointId === sp.id) updateOffsetPanelInfo();
      measureResultBar.textContent = "編輯模式：已更新「" + sp.label + "」位置（可用 popup 還原上一步）";
      measureResultBar.style.display = "block";
      return;
    }

    // 批次拖曳多個點(一次移動多筆到同一位置)：調整3(v2.5) 改用 app 自訂確認框(取代系統 window.confirm)
    var labelList = selected.map(function (p) { return "・" + p.label; }).join("\n");
    var targetLatLng = { lat: target.lat, lng: target.lng }; // 捕捉落點座標供 callback 使用
    var moveCount = selected.length;
    appConfirm("確定將 " + moveCount + " 筆記錄移動到此位置？\n\n" + labelList, function () {
      // 確認 → 落地。重讀最新資料避免競態，只移動仍在選取中的點。
      var pts = loadPoints();
      var now = new Date().toISOString();
      pts.forEach(function (p) {
        if (editSelectedIds.indexOf(p.id) === -1) return;
        // 舊資料第一次被編輯時，先把當時的 lat/lng 複製進 original 欄位再修改
        if (p.originalLat == null || p.originalLng == null) {
          p.originalLat = p.lat;
          p.originalLng = p.lng;
        }
        if (!p.editHistory) p.editHistory = [];
        p.editHistory.push({ editedAt: now, fromLat: p.lat, fromLng: p.lng, toLat: targetLatLng.lat, toLng: targetLatLng.lng });
        p.lat = targetLatLng.lat;
        p.lng = targetLatLng.lng;
      });
      savePoints(pts);
      editSelectedIds = [];
      renderMapMarkers();
      measureResultBar.textContent = "編輯模式：已移動 " + moveCount + " 筆記錄";
      measureResultBar.style.display = "block";
    }, function () {
      renderMapMarkers(); // 取消 → 未落地，重繪即彈回原位；選取狀態保留(renderMapMarkers 會重新套用)
    });
  }

  // 編輯模式 popup：狀態 + 還原上一步 / 還原 GPS 原始位置(都經確認框才寫入)
  function buildEditPopupContent(p) {
    var div = document.createElement("div");
    var edited = isPointEdited(p);
    var head = document.createElement("div");
    head.innerHTML = "<b>" + escapeHtml(p.label) + "</b><br>目前座標: " + p.lat.toFixed(6) + ", " + p.lng.toFixed(6);
    div.appendChild(head);

    var status = document.createElement("div");
    status.className = "edit-popup-status" + (edited ? " edited" : "");
    status.textContent = edited ? editedFlagText(p) : "GPS 原始";
    div.appendChild(status);

    if (edited) {
      var actions = document.createElement("div");
      actions.className = "edit-popup-actions";

      var undoBtn = document.createElement("button");
      undoBtn.textContent = "↩️ 還原上一步";
      undoBtn.addEventListener("click", function () {
        if (!window.confirm("確定還原「" + p.label + "」上一步修正？")) return;
        var points = loadPoints();
        points.forEach(function (x) {
          if (x.id !== p.id || !x.editHistory || x.editHistory.length === 0) return;
          var h = x.editHistory.pop();
          x.lat = h.fromLat;
          x.lng = h.fromLng;
        });
        savePoints(points);
        leafletMap.closePopup();
        renderMapMarkers();
        if (offsetPanelPointId === p.id) updateOffsetPanelInfo(); // 微調面板同步狀態
      });
      actions.appendChild(undoBtn);

      if (p.originalLat != null && p.originalLng != null) {
        var restoreBtn = document.createElement("button");
        restoreBtn.textContent = "📡 還原 GPS 原始位置";
        restoreBtn.addEventListener("click", function () {
          if (!window.confirm("確定將「" + p.label + "」還原到 GPS 原始位置？此動作會清空編輯歷史。")) return;
          var points = loadPoints();
          points.forEach(function (x) {
            if (x.id !== p.id) return;
            x.lat = x.originalLat;
            x.lng = x.originalLng;
            x.editHistory = [];
          });
          savePoints(points);
          leafletMap.closePopup();
          renderMapMarkers();
          if (offsetPanelPointId === p.id) updateOffsetPanelInfo();
        });
        actions.appendChild(restoreBtn);
      }
      div.appendChild(actions);
    }
    return div;
  }

  // 新增B(v3): 貨物記錄區塊(地圖 popup / AR 詳情共用)。onChange 於資料變更後重繪宿主。
  // v5: 貨物顯示名稱(含型號/粗細)與顏色點(未上色→中性樣式)
  function cargoDisplayName(rec) {
    var s = rec.name;
    if (rec.quantity != null) s += "　" + rec.quantity + (rec.unit || "");
    else if (rec.unit) s += "　" + rec.unit;
    if (rec.rebarSpec) s += "　" + rec.rebarSpec;
    if (rec.rebarDiameter != null && String(rec.rebarDiameter).trim() !== "") s += "　" + rec.rebarDiameter;
    return s;
  }
  function cargoColorDotHtml(rec) {
    return rec.colorHex
      ? "<span class='cargo-color-dot' style='background:" + rec.colorHex + "'></span>"
      : "<span class='cargo-color-dot no-color' title='未上色'></span>";
  }

  // buildCargoSection(pointId, onChange, onMove) —— onMove(rec) 讓呼叫端決定移動方式(地圖點選 or 清單)
  function buildCargoSection(pointId, onChange, onMove) {
    var p = byId(loadPoints(), pointId);
    var sec = document.createElement("div");
    sec.className = "cargo-section";
    var h = document.createElement("h4");
    h.textContent = "📦 貨物記錄（在場）" + (filterIsActive() ? "（篩選中）" : "");
    sec.appendChild(h);
    var act = p ? filteredActiveCargo(p) : []; // 修正3/調整8: 套用全域篩選
    if (act.length === 0) {
      var empty = document.createElement("div");
      empty.className = "cargo-empty";
      empty.textContent = filterIsActive() ? "沒有符合篩選的在場貨物" : "目前沒有在場貨物";
      sec.appendChild(empty);
    } else {
      act.forEach(function (rec) {
        var item = document.createElement("div");
        item.className = "cargo-item";
        var name = document.createElement("div");
        name.className = "cargo-item-name";
        name.innerHTML = cargoColorDotHtml(rec) + escapeHtml(cargoDisplayName(rec)) +
          (rec.colorLabel ? "（" + escapeHtml(rec.colorLabel) + "）" : "");
        item.appendChild(name);
        var meta = document.createElement("div");
        meta.className = "cargo-item-meta";
        meta.textContent = "進場：" + new Date(rec.arrivedAt).toLocaleString() + (rec.note ? "　備註：" + rec.note : "");
        item.appendChild(meta);
        if (rec.photo) {
          var img = document.createElement("img");
          img.className = "cargo-thumb";
          img.src = rec.photo;
          item.appendChild(img);
        }
        var ship = document.createElement("button");
        ship.className = "cargo-ship-btn";
        ship.textContent = "標記已出貨";
        ship.addEventListener("click", function () { shipCargo(pointId, rec.id, onChange); });
        item.appendChild(ship);
        var editBtn = document.createElement("button"); // 調整7: 編輯
        editBtn.className = "cargo-move-btn";
        editBtn.textContent = "✏️ 編輯";
        editBtn.addEventListener("click", function () { openCargoModal(pointId, onChange, rec.id); });
        item.appendChild(editBtn);
        var moveBtn = document.createElement("button"); // 調整2/9: 移動
        moveBtn.className = "cargo-move-btn";
        moveBtn.textContent = "🔄 移動到其他點";
        moveBtn.addEventListener("click", function () {
          if (onMove) onMove(rec);
          else openPointPicker("把「" + rec.name + "」移動到：", pointId, function (toId) {
            if (moveCargoRecord(pointId, rec.id, toId) && onChange) onChange();
          });
        });
        item.appendChild(moveBtn);
        sec.appendChild(item);
      });
    }
    var addBtn = document.createElement("button");
    addBtn.className = "cargo-add-btn";
    addBtn.textContent = "➕ 新增貨物記錄";
    addBtn.addEventListener("click", function () { openCargoModal(pointId, onChange); });
    sec.appendChild(addBtn);
    return sec;
  }

  // 標記已出貨: 只改 status/shippedAt，絕不刪除(記錄永久保留供報表)
  function shipCargo(pointId, recId, onChange) {
    var pv = byId(loadPoints(), pointId);
    var rv = pv && pv.cargoRecords ? pv.cargoRecords.filter(function (r) { return r.id === recId; })[0] : null;
    if (!rv) return;
    if (!window.confirm("確定將「" + rv.name + "」標記為已出貨？\n（記錄會永久保留，僅狀態變更）")) return;
    var points = loadPoints();
    var p = byId(points, pointId);
    (p.cargoRecords || []).forEach(function (r) {
      if (r.id === recId) { r.status = "shipped"; r.shippedAt = new Date().toISOString(); }
    });
    savePoints(points);
    if (onChange) onChange();
  }

  // 貨物照片可能塞爆空間 → 比照登記照片的 quota 保護(失敗則去照片重存)
  function saveWithCargoQuotaGuard(points, cargoRec) {
    try { savePoints(points); return true; }
    catch (e) {
      if (isQuotaError(e) && cargoRec && cargoRec.photo) {
        delete cargoRec.photo;
        try { savePoints(points); window.alert("儲存空間已滿，此貨物記錄將不含照片儲存。"); return true; }
        catch (e2) { /* fall through */ }
      }
      window.alert("儲存空間已滿，無法儲存這筆貨物記錄，請先刪除部分資料再試。");
      return false;
    }
  }

  function buildNormalPopupContent(p) {
    var div = document.createElement("div");
    var gmapsUrl = "https://www.google.com/maps/search/?api=1&query=" + p.lat + "," + p.lng;
    var head = document.createElement("div");
    head.innerHTML = "<b>" + escapeHtml(p.label) + "</b><br>" +
      (isPointEdited(p) ? "<span class='popup-edited-flag'>⚠️ " + editedFlagText(p) + "</span><br>" : "") +
      "登記時間: " + new Date(p.createdAt).toLocaleString() + "<br>" +
      "登記時精度: ±" + (p.accuracy != null ? p.accuracy.toFixed(1) : "?") + "m<br>" +
      "<a href='" + gmapsUrl + "' target='_blank' rel='noopener noreferrer'>在 Google 地圖開啟</a>";
    div.appendChild(head);
    // 地圖 popup 的移動採「地圖點選目標」模式(調整9)
    div.appendChild(buildCargoSection(p.id, function () { refreshMapPopupFor(p.id); }, function (rec) { startMapMove(p.id, rec); }));
    return div;
  }

  // 貨物變更後重繪 markers(更新徽章)並重新開啟該點 popup
  function refreshMapPopupFor(pointId) {
    renderMapMarkers();
    var ref = mapMarkerRefs.filter(function (r) { return r.point.id === pointId; })[0];
    if (ref) ref.marker.openPopup();
  }

  // ---------- 調整9: 地圖點選目標地標來移動貨物 ----------
  var mapMovePrompt = document.getElementById("mapMovePrompt");
  var mapMoveText = document.getElementById("mapMoveText");
  var mapMoveUseList = document.getElementById("mapMoveUseList");
  var mapMoveCancel = document.getElementById("mapMoveCancel");
  var mapMoveState = { active: false, fromPointId: null, rec: null };

  function startMapMove(fromPointId, rec) {
    if (leafletMap) leafletMap.closePopup();
    mapMoveState = { active: true, fromPointId: fromPointId, rec: rec };
    mapMoveText.textContent = "請點選要把『" + rec.name + "』移動到哪個地標";
    mapMovePrompt.classList.add("active");
    renderMapMarkers(); // 重繪以解除 popup 綁定，讓點擊變成選目標
  }
  function cancelMapMove() {
    mapMoveState = { active: false, fromPointId: null, rec: null };
    mapMovePrompt.classList.remove("active");
    renderMapMarkers(); // 復原 popup 綁定
  }
  function doMapMoveTo(toPointId) {
    var st = mapMoveState;
    if (!st.active || toPointId === st.fromPointId) return;
    var to = byId(loadPoints(), toPointId);
    if (!window.confirm("把『" + st.rec.name + "』移動到『" + (to ? to.label : "?") + "』？")) return;
    if (moveCargoRecord(st.fromPointId, st.rec.id, toPointId)) {
      cancelMapMove();
      renderMapMarkers();
    }
  }
  mapMoveCancel.addEventListener("click", cancelMapMove);
  mapMoveUseList.addEventListener("click", function () {
    var st = mapMoveState;
    if (!st.active) return;
    var fromId = st.fromPointId, rec = st.rec;
    cancelMapMove();
    openPointPicker("把「" + rec.name + "」移動到：", fromId, function (toId) {
      if (moveCargoRecord(fromId, rec.id, toId)) renderMapMarkers();
    });
  });

  // ---------- 新增B(v3): 貨物記錄輸入框 ----------
  var cargoModalOverlay = document.getElementById("cargoModalOverlay");
  var cargoName = document.getElementById("cargoName");
  var cargoQty = document.getElementById("cargoQty");
  var cargoUnit = document.getElementById("cargoUnit");
  var cargoArrived = document.getElementById("cargoArrived");
  var cargoNote = document.getElementById("cargoNote");
  var cargoModalConfirm = document.getElementById("cargoModalConfirm");
  var cargoModalCancel = document.getElementById("cargoModalCancel");
  var cargoPhotoInput = document.getElementById("cargoPhotoInput");
  var cargoPhotoBtn = document.getElementById("cargoPhotoBtn");
  var cargoPhotoPreview = document.getElementById("cargoPhotoPreview");
  var cargoPhotoThumb = document.getElementById("cargoPhotoThumb");
  var cargoPhotoRemove = document.getElementById("cargoPhotoRemove");
  var cargoColor = document.getElementById("cargoColor");
  var cargoColorLabel = document.getElementById("cargoColorLabel");
  var cargoRecentColors = document.getElementById("cargoRecentColors");
  var cargoRebarSpec = document.getElementById("cargoRebarSpec");
  var cargoRebarDiameter = document.getElementById("cargoRebarDiameter");
  var cargoUseColor = document.getElementById("cargoUseColor");
  var cargoModalTitle = document.getElementById("cargoModalTitle");
  var cargoModalTargetId = null;
  var cargoModalOnChange = null;
  var cargoModalPhoto = null;
  var cargoModalEditRecId = null; // 調整7: 編輯中的記錄 id(null=新增)

  // 調整4: 顏色為選填 —— 用「上色」勾選框啟用色盤，未勾則不上色
  function setColorEnabled(on) {

  function buildRecentColorSwatches() {

  // Date → datetime-local 輸入值(本地時區 YYYY-MM-DDTHH:mm)
  function toLocalDatetimeValue(d) {
    var p2 = function (n) { return (n < 10 ? "0" : "") + n; };
    return d.getFullYear() + "-" + p2(d.getMonth() + 1) + "-" + p2(d.getDate()) +
      "T" + p2(d.getHours()) + ":" + p2(d.getMinutes());
  }
  function updateCargoModalButtons() {

      cargoRebarSpec.value = rec.rebarSpec || "";
      cargoRebarDiameter.value = rec.rebarDiameter != null ? rec.rebarDiameter : "";

      else { cargoColor.value = DEFAULT_CARGO_COLOR; setColorEnabled(false); }
      cargoArrived.value = toLocalDatetimeValue(new Date(rec.arrivedAt));
      cargoArrived.disabled = true; // 編輯不改 arrivedAt

  // 調整4B(v2.5): 貨物新增/編輯表單欄位多、誤觸成本高 —— 「不」讓點外部背景關閉，只能用取消/儲存鈕關閉。

    var colorHex = useColor ? (cargoColor.value || DEFAULT_CARGO_COLOR) : null;
    var colorLabel = useColor ? (cargoColorLabel.value.trim() || null) : null;

    if (!p.cargoRecords) p.cargoRecords = [];
    var savedRec;
    if (cargoModalEditRecId) { // 調整7: 更新既有記錄(不動 id/arrivedAt/moveHistory/status/shippedAt)
      var rec = p.cargoRecords.filter(function (r) { return r.id === cargoModalEditRecId; })[0];
      if (!rec) { closeCargoModal(); return; }

      rec.colorHex = colorHex; rec.colorLabel = colorLabel;
      rec.rebarSpec = rebarSpec; rec.rebarDiameter = rebarDiameter; rec.note = note;
      if (cargoModalPhoto) rec.photo = cargoModalPhoto; else delete rec.photo;
      savedRec = rec;
    } else {
      savedRec = {
        id: uid(), name: name, quantity: qty, unit: unit,

        arrivedAt: cargoArrived.value ? new Date(cargoArrived.value).toISOString() : new Date().toISOString(),
        shippedAt: null, status: "active"

      if (cargoModalPhoto) savedRec.photo = cargoModalPhoto;
      p.cargoRecords.push(savedRec);

    saveWithCargoQuotaGuard(points, savedRec); // 空間滿時自動改存無照片版本，不讓整筆遺失
    if (colorHex) pushRecentColor(colorHex, colorLabel); // 調整4: 記住最近用色(僅上色時)

  // ---------- 通用地標選擇清單(調整2 移動 / 調整3 新增選地標) ----------
  var pointPickerOverlay = document.getElementById("pointPickerOverlay");
  var pointPickerTitle = document.getElementById("pointPickerTitle");
  var pointPickerList = document.getElementById("pointPickerList");
  var pointPickerCancel = document.getElementById("pointPickerCancel");
  // excludeId 排除某地標(移動時排除目前所在點)；onPick(toId) 選定後回呼
  function openPointPicker(title, excludeId, onPick) {

  // ---------- 出貨模式顏色選擇(調整4/8: 只列有上色的顏色，設定寫入共用 filterState) ----------
  var shipColorOverlay = document.getElementById("shipColorOverlay");
  var shipColorList = document.getElementById("shipColorList");
  var shipColorCancel = document.getElementById("shipColorCancel");
  function openShipColorPicker(onPick) {

  function renderMapMarkers() {
    mapMarkersLayer.clearLayers();
    mapLinesLayer.clearLayers();
    mapMarkerRefs = [];
    var points = loadPoints();
    points.forEach(function (p) {
      // 調整8/修正3: 全域篩選 —— 只顯示通過篩選的地標(僅影響顯示，不動資料)。編輯/量測模式不套用篩選以免誤藏。
      if (!editModeActive && !measureModeActive && filterIsActive() && !pointPassesFilter(p)) return;
      // v3: 有在場貨物→貨物徽章圖示，否則一般藍色(量測模式維持預設藍以免與選取樣式混淆)
      var icon = measureModeActive ? new L.Icon.Default() : defaultIconFor(points, p);
      var marker = L.marker([p.lat, p.lng], { icon: icon });
      marker._pointId = p.id; // 供聚合清單對照
      mapMarkersLayer.addLayer(marker); // 支援 cluster group 與 layer group
      // 調整9: 移動目標選取模式中，marker 不綁 popup，點擊視為選目標
      if (mapMoveState.active) {
        // 不綁 popup
      } else if (editModeActive) {
        marker.bindPopup(buildEditPopupContent(p));
      } else if (!measureModeActive) {
        marker.bindPopup(buildNormalPopupContent(p)); // v3: DOM popup 含貨物區塊
      }
      marker.on("click", function () {
        if (mapMoveState.active) doMapMoveTo(p.id);
        else if (measureModeActive) onMapMarkerClick(p, marker);
        else if (editModeActive) onEditMarkerClick(p, marker);
      });
      marker.on("dragend", function () { onEditMarkerDragEnd(p, marker); });
      mapMarkerRefs.push({ point: p, marker: marker });
    });

    if (editModeActive) applySelectionVisuals();
  }

  // 需求3: 涵蓋所有登記點 + 目前位置(若有)；沒有登記點就以目前位置為中心；都沒有就用預設中心點。
  function fitMapView() {
    var pointLatLngs = loadPoints().map(function (p) { return [p.lat, p.lng]; });

    if (pointLatLngs.length > 0) {
      var allLatLngs = pointLatLngs.slice();
      if (mapCurrentLocationMarker) allLatLngs.push(mapCurrentLocationMarker.getLatLng());
      if (allLatLngs.length === 1) {
        leafletMap.setView(allLatLngs[0], 17);
      } else {
        leafletMap.fitBounds(L.latLngBounds(allLatLngs), { padding: [40, 40] });
      }
    } else if (mapCurrentLocationMarker) {
      leafletMap.setView(mapCurrentLocationMarker.getLatLng(), 17);
    } else {
      leafletMap.setView(DEFAULT_MAP_CENTER, 15);
    }
  }

  function refreshMapCurrentLocation() {
    if (!("geolocation" in navigator)) {
      mapStatus.textContent = "此裝置/瀏覽器不支援 GPS 定位";
      return;
    }
    mapStatus.textContent = "定位中...";
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        var latLng = [pos.coords.latitude, pos.coords.longitude];
        if (mapCurrentLocationMarker) {
          mapCurrentLocationMarker.setLatLng(latLng);
        } else {
          mapCurrentLocationMarker = L.circleMarker(latLng, {
            radius: 8, color: "#1a73e8", fillColor: "#1a73e8", fillOpacity: 0.9, weight: 2
          }).addTo(leafletMap).bindPopup("目前位置");
        }
        mapStatus.textContent = "";
        fitMapView();
      },
      function (err) {
        mapStatus.textContent = "定位失敗: " + err.message + " (code " + err.code + ")";
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
    );
  }

  // ---------- 新增A(v3): 單點 8 方向位置微調(所有點適用) ----------
  var offsetPanel = document.getElementById("offsetPanel");
  var offsetPanelInfo = document.getElementById("offsetPanelInfo");
  var offsetStepRow = document.getElementById("offsetStepRow");
  var offsetPad = document.getElementById("offsetPad");
  var offsetPanelClose = document.getElementById("offsetPanelClose");
  var offsetPanelPointId = null;
  var offsetStepM = OFFSET_STEP_DEFAULT_M;

  // 8 方向 → (東位移, 北位移) 單位向量(對角線兩軸各動一步)
  var OFFSET_DIRECTIONS = {
    "NW": [-1, 1], "N": [0, 1], "NE": [1, 1],
    "W":  [-1, 0], "E": [1, 0],
    "SW": [-1, -1], "S": [0, -1], "SE": [1, -1]
  };
  var PAD_LAYOUT = ["NW", "N", "NE", "W", "center", "E", "SW", "S", "SE"];
  var PAD_ARROWS = { NW: "↖", N: "↑", NE: "↗", W: "←", E: "→", SW: "↙", S: "↓", SE: "↘" };
  // 修正1(v2.4): AR 微調第一人稱方向 —— 每個方向鍵對應「相對使用者當下朝向」的角度
  // (前=0、右=90、後=180、左=270，四個對角為 45/135/225/315)。實際移動方位角 = 此相對角 + currentHeading。
  var OFFSET_RELATIVE_ANGLE = { N: 0, NE: 45, E: 90, SE: 135, S: 180, SW: 225, W: 270, NW: 315 };

  function buildOffsetStepRow() {
    offsetStepRow.innerHTML = "";
    OFFSET_STEP_OPTIONS_M.forEach(function (step) {
      var b = document.createElement("button");
      b.textContent = step + "m";
      if (step === offsetStepM) b.className = "active";
      b.addEventListener("click", function () {
        offsetStepM = step;
        buildOffsetStepRow();
      });
      offsetStepRow.appendChild(b);
    });
  }

  function buildOffsetPad() {
    offsetPad.innerHTML = "";
    PAD_LAYOUT.forEach(function (dir) {
      var cell = document.createElement("button");
      if (dir === "center") {
        cell.className = "pad-center";
        cell.textContent = "◎";
        cell.disabled = true;
      } else {
        cell.textContent = PAD_ARROWS[dir];
        var fire = function () {
          var v = OFFSET_DIRECTIONS[dir];
          nudgePoint(offsetPanelPointId, v[0] * offsetStepM, v[1] * offsetStepM);
        };
        // 修正2: touchend 直接觸發並 preventDefault，避免 iOS 把快速連點判定為雙擊縮放
        cell.addEventListener("touchend", function (e) { e.preventDefault(); fire(); }, { passive: false });
        cell.addEventListener("click", fire);
      }
      offsetPad.appendChild(cell);
    });
  }

  function updateOffsetPanelInfo() {
    var points = loadPoints();
    var p = byId(points, offsetPanelPointId);
    if (!p) { closeOffsetPanel(); return; }
    offsetPanelInfo.innerHTML = "微調「" + escapeHtml(p.label) + "」位置<br>" +
      "座標：" + p.lat.toFixed(6) + ", " + p.lng.toFixed(6) + "<br>" +
      "狀態：" + (isPointEdited(p) ? "已修正" : "GPS 原始");
  }

  function openOffsetPanel(pointId) {
    offsetPanelPointId = pointId;
    buildOffsetStepRow();
    buildOffsetPad();
    updateOffsetPanelInfo();
    offsetPanel.classList.add("active");
  }
  function closeOffsetPanel() {
    offsetPanel.classList.remove("active");
    offsetPanelPointId = null;
  }
  offsetPanelClose.addEventListener("click", closeOffsetPanel);

  // 按方向鍵 → 直接位移該點 lat/lng(公尺→度近似)，比照拖曳寫入 original/editHistory，共用還原機制
  function nudgePoint(pointId, dEast, dNorth) {
    if (pointId == null) return;
    var points = loadPoints();
    var p = byId(points, pointId);
    if (!p) return;
    if (p.originalLat == null || p.originalLng == null) { // 首次修正先保留 GPS 原始
      p.originalLat = p.lat;
      p.originalLng = p.lng;
    }
    var newLat = p.lat + dNorth / 111320;
    var newLng = p.lng + dEast / (111320 * Math.cos(toRad(p.lat)));
    if (!p.editHistory) p.editHistory = [];
    p.editHistory.push({ editedAt: new Date().toISOString(), fromLat: p.lat, fromLng: p.lng, toLat: newLat, toLng: newLng });
    p.lat = newLat;
    p.lng = newLng;
    savePoints(points);
    if (mapMarkersLayer) renderMapMarkers();           // 地圖已初始化才重繪(AR 呼叫時可能還沒進過地圖)
    if (offsetPanelPointId === pointId) updateOffsetPanelInfo(); // 地圖微調面板同步
    // AR 由 updateAR 迴圈自動反映新位置/距離
  }

  // 調整1(v2.5): AR 微調的第一人稱位移已移到 nudgeBufferApply(只改暫存座標、按完成才落地)，
  // 此處不再有 nudgePointFirstPerson。地圖編輯模式的 8 方向鍵仍走 nudgePoint(即時儲存，見 buildOffsetPad)。

  // 調整5: 通用微調控制(供 AR 詳情卡片重用地圖同一套 nudgePoint 邏輯)
  function renderNudgeControls(container, pointId, onAfter) {
    container.innerHTML = "";
    var stepRow = document.createElement("div");
    stepRow.className = "nudge-step-row";
    function rebuildSteps() {
      stepRow.innerHTML = "";
      OFFSET_STEP_OPTIONS_M.forEach(function (step) {
        var b = document.createElement("button");
        b.textContent = step + "m";
        if (step === offsetStepM) b.className = "active";
        b.addEventListener("click", function () { offsetStepM = step; rebuildSteps(); });
        stepRow.appendChild(b);
      });
    }
    rebuildSteps();
    var pad = document.createElement("div");
    pad.className = "nudge-pad";
    PAD_LAYOUT.forEach(function (dir) {
      var cell = document.createElement("button");
      if (dir === "center") { cell.className = "pad-center"; cell.textContent = "◎"; cell.disabled = true; }
      else {
        cell.textContent = PAD_ARROWS[dir];
        var fire = function () {
          // 修正1(v2.4)+調整1(v2.5): AR 微調以第一人稱方向改「暫存座標」，按完成才落地
          nudgeBufferApply(dir, offsetStepM);
          if (onAfter) onAfter();
        };
        // 修正2: touchend preventDefault 避免雙擊縮放，快速連點每次都觸發
        cell.addEventListener("touchend", function (e) { e.preventDefault(); fire(); }, { passive: false });
        cell.addEventListener("click", fire);
      }
      pad.appendChild(cell);
    });
    container.appendChild(stepRow);
    container.appendChild(pad);
  }

  // ---------- 調整3(v2): 聚合顯示開關 ----------
  function setClusterMode(active) {
    clusterModeActive = active;
    if (leafletMap && mapMarkersLayer) {
      leafletMap.removeLayer(mapMarkersLayer);
      mapMarkersLayer = buildMarkersLayer().addTo(leafletMap);
      renderMapMarkers();

    btnToggleCluster.textContent = clusterModeActive ? "🔗 聚合顯示：開啟" : "🔗 聚合顯示：關閉";
  }

  function enterMapTab() {
    initMapIfNeeded();

    // 每次重新進入頁籤都還原成未量測/未編輯狀態：markers 即將被 renderMapMarkers() 整組換新，
    // 舊的量測連線/選取樣式參照的是即將銷毀的 marker 物件，直接重置狀態避免殘留。
    closeOffsetPanel(); // 調整4(v2): 關閉偏移面板
    measureModeActive = false;
    measureFirstPoint = null;
    measureActiveMarkers = [];
    if (measureLine) {
      leafletMap.removeLayer(measureLine);
      measureLine = null;
    }
    btnToggleMeasureMode.textContent = "📏 量測模式：關閉";
    btnClearMeasure.style.display = "none";
    editModeActive = false;
    editSelectedIds = [];
    btnToggleEditMode.textContent = "✏️ 編輯模式：關閉";
    btnSelectRecent.style.display = "none";
    measureResultBar.textContent = "";
    measureResultBar.style.display = "none";
    mapMovePrompt.classList.remove("active"); // 調整9: 重置移動模式
    mapMoveState = { active: false, fromPointId: null, rec: null };

    renderMapMarkers();
    syncFilterUI(); // 調整8: 進地圖時套用目前 filterState(含商品頁籤設定的篩選)並更新提示條
    fitMapView();
    // 剛從 display:none 切成可見時容器尺寸才會確定，下一輪畫面更新後要通知 Leaflet 重新量測。
    requestAnimationFrame(function () {
      leafletMap.invalidateSize();
      fitMapView();
    });
    if (!mapAutoFetchedLocationOnce) {
      mapAutoFetchedLocationOnce = true;
      refreshMapCurrentLocation(); // 需求3: 只在第一次進入時自動抓一次，之後靠手動按鈕更新，避免不必要耗電
    }
  }

  btnRefreshMapLocation.addEventListener("click", refreshMapCurrentLocation);
  btnToggleMeasureMode.addEventListener("click", function () { setMeasureMode(!measureModeActive); });
  btnClearMeasure.addEventListener("click", function () {
    clearMeasurementVisuals();
    if (measureModeActive) {
      measureResultBar.textContent = "量測模式：請點選第一個登記點...";
      measureResultBar.style.display = "block";
    }
  });
  btnToggleEditMode.addEventListener("click", function () { setEditMode(!editModeActive); });
  btnSelectRecent.addEventListener("click", selectRecentPoints);
  btnSelectRecent.textContent = "🕐 選取最近 " + RECENT_SELECT_COUNT + " 筆";
  btnToggleCluster.addEventListener("click", function () { setClusterMode(!clusterModeActive); });

  // ---------- 調整8: 出貨模式與地圖篩選(讀寫共用 filterState.colorHex) ----------
  var btnMapShipping = document.getElementById("btnMapShipping");
  var btnViewShipping = document.getElementById("btnViewShipping");
  var mapFilterStrip = document.getElementById("mapFilterStrip");
  var mapFilterText = document.getElementById("mapFilterText");
  var btnClearMapFilter = document.getElementById("btnClearMapFilter");

  // 篩選變更後刷新所有相關 UI(出貨鈕/地圖markers+提示條/商品清單/商品下拉)
  function syncFilterUI() {
    var on = filterState.colorHex != null;
    var stxt = on ? "🚚 出貨模式：" + (function () { var l = ""; distinctActiveColors(loadPoints()).forEach(function (c) { if (c.colorHex === filterState.colorHex) l = c.colorLabel; }); return l || filterState.colorHex; })() : "🚚 出貨模式：關閉";
    btnMapShipping.textContent = stxt; btnViewShipping.textContent = stxt;
    btnMapShipping.style.borderColor = on ? filterState.colorHex : "";
    btnViewShipping.style.borderColor = on ? filterState.colorHex : "";
    // 地圖篩選提示條
    if (filterIsActive()) { mapFilterText.textContent = "篩選中：" + filterSummaryText(); mapFilterStrip.classList.add("active"); }
    else mapFilterStrip.classList.remove("active");
    // 地圖 markers
    if (leafletMap && mapMarkersLayer) renderMapMarkers();
    // 商品下拉選單值與清單(商品頁籤 active 時)
    if (typeof filterLandmark !== "undefined") {
      filterLandmark.value = filterState.landmarkId || "";
      filterColor.value = filterState.colorHex || "";
    }
    if (screens.products.classList.contains("active")) renderProducts();
  }
  function clearAllFilters() { filterState.landmarkId = null; filterState.colorHex = null; syncFilterUI(); }
  btnClearMapFilter.addEventListener("click", clearAllFilters);

  function toggleShippingMode() {
    if (filterState.colorHex != null) { filterState.colorHex = null; syncFilterUI(); return; } // 已開→關(僅清顏色)
    openShipColorPicker(function (hex) { filterState.colorHex = hex; syncFilterUI(); });
  }
  btnMapShipping.addEventListener("click", toggleShippingMode);
  btnViewShipping.addEventListener("click", toggleShippingMode);

  // ---------- 調整3: 商品頁籤 ----------
  var productsList = document.getElementById("productsList");
  var productsEmpty = document.getElementById("productsEmpty");
  var filterLandmark = document.getElementById("filterLandmark");
  var filterColor = document.getElementById("filterColor");
  var btnAddCargoEntry = document.getElementById("btnAddCargoEntry");
  var btnClearProductFilters = document.getElementById("btnClearProductFilters");

  function rebuildProductFilters(points) {
    filterLandmark.innerHTML = "<option value=''>全部</option>";
    points.forEach(function (p) {
      if (activeCargo(p).length === 0) return;
      var o = document.createElement("option"); o.value = p.id; o.textContent = p.label;
      filterLandmark.appendChild(o);
    });
    filterColor.innerHTML = "<option value=''>全部</option>";
    distinctActiveColors(points).forEach(function (c) { // 與出貨模式共用同一顏色來源
      var o = document.createElement("option"); o.value = c.colorHex;
      o.textContent = (c.colorLabel ? c.colorLabel + " " : "") + c.colorHex;
      filterColor.appendChild(o);
    });
    filterLandmark.value = filterState.landmarkId || "";
    if (filterLandmark.value !== (filterState.landmarkId || "")) filterLandmark.value = "";
    filterColor.value = filterState.colorHex || "";
    if (filterColor.value !== (filterState.colorHex || "")) filterColor.value = "";
  }

  function renderProducts() {
    var points = loadPoints();
    rebuildProductFilters(points);
    var flat = allActiveCargoFlat(points).filter(function (e) {
      if (filterState.landmarkId && e.point.id !== filterState.landmarkId) return false;
      if (filterState.colorHex && e.rec.colorHex !== filterState.colorHex) return false;
      return true;
    });
    productsList.innerHTML = "";
    productsEmpty.style.display = flat.length === 0 ? "block" : "none";
    flat.forEach(function (e) {
      var rec = e.rec, p = e.point;
      var item = document.createElement("div");
      item.className = "product-item";
      var head = document.createElement("div");
      head.className = "product-head";
      head.innerHTML = cargoColorDotHtml(rec) + escapeHtml(cargoDisplayName(rec));
      item.appendChild(head);
      var meta = document.createElement("div");
      meta.className = "product-meta";
      meta.innerHTML = "地標：" + escapeHtml(p.label) + "<br>" +
        (rec.colorLabel ? "顏色：" + escapeHtml(rec.colorLabel) + "<br>" : "") +
        "進場：" + new Date(rec.arrivedAt).toLocaleString();
      item.appendChild(meta);
      var actions = document.createElement("div");
      actions.className = "product-actions";
      var shipBtn = document.createElement("button");
      shipBtn.textContent = "標記已出貨";
      shipBtn.addEventListener("click", function (ev) { ev.stopPropagation(); shipCargo(p.id, rec.id, renderProducts); });
      var editBtn = document.createElement("button");
      editBtn.textContent = "✏️ 編輯";
      editBtn.addEventListener("click", function (ev) { ev.stopPropagation(); openCargoModal(p.id, renderProducts, rec.id); });
      var moveBtn = document.createElement("button");
      moveBtn.textContent = "🔄 移動到其他點";
      moveBtn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        openPointPicker("把「" + rec.name + "」移動到：", p.id, function (toId) {
          if (moveCargoRecord(p.id, rec.id, toId)) renderProducts();
        });
      });
      actions.appendChild(shipBtn); actions.appendChild(editBtn); actions.appendChild(moveBtn);
      item.appendChild(actions);
      head.addEventListener("click", function () { item.classList.toggle("expanded"); });
      productsList.appendChild(item);
    });
  }

  filterLandmark.addEventListener("change", function () { filterState.landmarkId = filterLandmark.value || null; syncFilterUI(); });
  filterColor.addEventListener("change", function () { filterState.colorHex = filterColor.value || null; syncFilterUI(); });
  btnClearProductFilters.addEventListener("click", clearAllFilters);
  btnAddCargoEntry.addEventListener("click", function () {
    openPointPicker("選擇要新增貨物的地標：", null, function (pid) {
      openCargoModal(pid, renderProducts);
    });
  });
  // 供登記列表徽章跳轉：切到商品頁籤並套用該地標篩選
  function gotoProductsForLandmark(pointId) {
    filterState.landmarkId = pointId;
    switchTab("products"); // switchTab 內會呼叫 renderProducts
    syncFilterUI();
  }

})();
</script>
</body>
</html>
