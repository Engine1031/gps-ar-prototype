<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>GPS AR 定點實驗</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; color: #fff;
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    overscroll-behavior: none;
  }
  #app { height: 100vh; display: flex; flex-direction: column; }

  /* Tabs */
  #tabs { display: flex; background: #111; border-bottom: 2px solid #444; flex: 0 0 auto; }
  .tab-btn {
    flex: 1; padding: 16px 8px; font-size: 18px; font-weight: bold;
    background: #111; color: #888; border: none; border-bottom: 4px solid transparent;
  }
  .tab-btn.active { color: #fff; border-bottom-color: #0f8; background: #1a1a1a; }

  .screen { flex: 1; overflow: hidden; position: relative; display: none; }
  .screen.active { display: block; }

  /* ---------- Register mode ---------- */
  #registerScreen { overflow-y: auto; padding: 16px; }
  .big-btn {
    display: block; width: 100%; padding: 22px; font-size: 22px; font-weight: bold;
    background: #0f8; color: #000; border: none; border-radius: 12px; margin-bottom: 12px;
  }
  .big-btn:active { background: #0c6; }
  .secondary-btn {
    display: block; width: 100%; padding: 16px; font-size: 18px; font-weight: bold;
    background: #333; color: #fff; border: 2px solid #666; border-radius: 12px; margin-bottom: 12px;
  }
  #registerStatus { min-height: 24px; font-size: 15px; color: #ff0; margin-bottom: 12px; white-space: pre-wrap; }
  #pointList { list-style: none; margin: 0; padding: 0; }
  #pointList li {
    background: #181818; border: 1px solid #444; border-radius: 10px;
    padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .point-info { font-size: 15px; line-height: 1.5; }
  .point-info b { font-size: 17px; color: #0f8; }
  .point-meta { color: #999; font-size: 12px; font-family: monospace; }
  .delete-btn { background: #a00; color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-size: 15px; flex: 0 0 auto; }
  .delete-btn:disabled { opacity: 0.4; }
  #emptyHint { color: #777; font-size: 14px; padding: 20px 0; text-align: center; }
  .sampling-badge { color: #ff0; font-weight: bold; }
  #storageUsage { color: #888; font-size: 12px; font-family: monospace; margin-bottom: 10px; }
  .point-thumb {
    display: block; margin-top: 6px; width: 56px; height: 56px;
    object-fit: cover; border-radius: 6px; border: 1px solid #444;
  }

  /* ---------- 標籤輸入 modal(與定位採樣解耦) ---------- */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.75);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box { background: #181818; border: 1px solid #444; border-radius: 14px; padding: 20px; width: 100%; max-width: 360px; }
  .modal-coords { font-size: 13px; color: #9f9; margin-bottom: 8px; }
  .modal-progress { font-size: 14px; color: #ff0; margin-bottom: 14px; min-height: 20px; }
  .modal-input {
    width: 100%; padding: 14px; font-size: 18px; background: #0d0d0d; color: #fff;
    border: 2px solid #666; border-radius: 10px; margin-bottom: 14px;
  }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button {
    flex: 1; margin-bottom: 0; padding: 14px; font-size: 17px; font-weight: bold;
    border-radius: 10px; border: 2px solid #666; background: #333; color: #fff; cursor: pointer;
  }
  /* 不可按時: 灰底灰字，文字仍清楚可見(絕不空白) */
  .modal-actions button:disabled { background: #222; color: #888; border-color: #444; cursor: not-allowed; opacity: 1; }
  #labelModalConfirm:not(:disabled) { background: #0f8; color: #000; border-color: #0f8; }

  /* ---------- 拍照(選填) ---------- */
  .modal-photo-row { margin-bottom: 14px; }
  #labelModalPhotoBtn {
    width: 100%; padding: 12px; font-size: 16px; font-weight: bold;
    background: #234; color: #fff; border: 2px solid #567; border-radius: 10px; cursor: pointer;
  }
  #labelModalPhotoBtn:disabled { opacity: 0.5; cursor: wait; }
  .modal-photo-preview { display: flex; align-items: center; gap: 12px; }
  .modal-photo-preview img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1px solid #666; }
  #labelModalPhotoRemove {
    padding: 8px 12px; font-size: 14px; font-weight: bold;
    background: #a00; color: #fff; border: none; border-radius: 8px; cursor: pointer;
  }

  /* ---------- View / AR mode ---------- */
  #viewScreen { background: #000; }
  #camera {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #000;
  }
  /* 圖層本身不吃點擊(讓相機/空白處穿透)，只有標籤元素開啟 pointer-events 供點擊看詳情 */
  #overlayLayer { position: absolute; inset: 0; pointer-events: none; }
  .marker {
    position: absolute; top: 42%; transform: translate(-50%, -50%);
    background: rgba(0, 40, 20, 0.75); border: 2px solid #0f8; border-radius: 10px;
    padding: 6px 10px; color: #fff; font-size: 14px; font-weight: bold;
    white-space: nowrap; text-align: center; display: none;
    pointer-events: auto; cursor: pointer;
  }
  .marker .marker-dist { display: block; font-size: 12px; font-weight: normal; color: #9f9; }

  /* ---------- AR 標籤詳情卡片 ---------- */
  #arDetailCard {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 30; width: 88%; max-width: 340px; max-height: 80vh; overflow-y: auto;
    background: rgba(10, 20, 15, 0.96); border: 2px solid #0f8; border-radius: 14px;
    padding: 16px; display: none;
  }
  #arDetailCard.active { display: block; }
  #arDetailClose {
    width: 100%; padding: 12px; margin-bottom: 12px; font-size: 16px; font-weight: bold;
    background: #333; color: #fff; border: 1px solid #666; border-radius: 8px; cursor: pointer;
  }
  #arDetailBody h3 { margin: 0 0 10px; font-size: 20px; color: #0f8; }
  .ar-detail-row {
    display: flex; justify-content: space-between; gap: 10px;
    padding: 6px 0; border-bottom: 1px solid #234; font-size: 14px;
  }
  .ar-detail-row span { color: #9c9; flex: 0 0 auto; }
  .ar-detail-row b { color: #fff; text-align: right; word-break: break-all; }
  .ar-detail-photo {
    display: block; width: 100%; margin-top: 12px; border-radius: 8px; border: 1px solid #444;
  }

  #viewTopBar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; gap: 8px; padding: 8px; background: linear-gradient(rgba(0,0,0,0.6), transparent);
  }
  #viewTopBar button {
    flex: 0 0 auto; padding: 10px 12px; font-size: 14px; font-weight: bold;
    background: #222; color: #fff; border: 1px solid #666; border-radius: 8px;
  }
  #fovWrap { display: flex; align-items: center; gap: 6px; background: #222; border: 1px solid #666; border-radius: 8px; padding: 6px 10px; }
  #fovWrap label { font-size: 13px; }
  #fovInput { width: 50px; font-size: 15px; background: #111; color: #fff; border: 1px solid #666; border-radius: 4px; text-align: center; }

  #startOverlay {
    position: absolute; inset: 0; z-index: 20; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }
  #startOverlay p { color: #ccc; font-size: 14px; max-width: 320px; text-align: center; margin-bottom: 20px; }

  #orientationWarning {
    position: absolute; top: 54px; left: 8px; right: 8px; z-index: 5;
    background: rgba(180, 40, 0, 0.85); color: #fff; font-weight: bold; font-size: 13px;
    padding: 8px 10px; border-radius: 8px; display: none;
  }

  #diagnostics {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; max-height: 42vh; overflow-y: auto;
    background: rgba(0, 0, 0, 0.8); color: #0f0; font-family: "SF Mono", Menlo, monospace;
    font-size: 12px; line-height: 1.5; padding: 8px 10px; white-space: pre-wrap;
  }
  #diagnostics .warn { color: #f80; }

  /* ---------- 地圖預覽 ---------- */
  #mapScreen { padding: 0; }
  #leafletMap { position: absolute; inset: 0; background: #222; }
  #mapTopBar {
    position: absolute; top: 8px; right: 8px; z-index: 500;
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  }
  #mapTopBar button {
    padding: 10px 14px; font-size: 14px; font-weight: bold;
    background: #222; color: #fff; border: 1px solid #666; border-radius: 8px;
  }
  #mapStatus {
    background: rgba(0, 0, 0, 0.7); color: #ff0; font-size: 12px;
    padding: 4px 8px; border-radius: 6px; max-width: 200px; text-align: right;
  }
  #mapStatus:empty { display: none; }
  .leaflet-popup-content a { color: #06c; }

  #btnClearMeasure { display: none; }
  #measureResultBar {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 500;
    background: rgba(0, 0, 0, 0.8); color: #ff0; font-size: 13px; font-weight: bold;
    padding: 8px 14px; border-radius: 8px; max-width: 90%; text-align: center; display: none;
  }
  .measure-selected-icon-inner {
    width: 22px; height: 22px; border-radius: 50%;
    background: #ffcc00; border: 3px solid #fff; box-shadow: 0 0 8px rgba(255, 204, 0, 0.9);
  }
  .measure-distance-tooltip {
    background: rgba(0, 0, 0, 0.85); color: #ffcc00; font-weight: bold; font-size: 13px; border: none;
  }
  .measure-distance-tooltip::before { display: none; }

  /* ---------- 編輯模式 ---------- */
  #btnSelectRecent { display: none; }
  .edit-selected-icon-inner {
    width: 22px; height: 22px; border-radius: 50%;
    background: #ff7b00; border: 3px solid #fff; box-shadow: 0 0 8px rgba(255, 123, 0, 0.9);
  }
  .edit-popup-status { font-size: 12px; color: #555; margin: 4px 0; }
  .edit-popup-status.edited { color: #c60; font-weight: bold; }
  .edit-popup-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .edit-popup-actions button {
    padding: 8px 10px; font-size: 13px; font-weight: bold;
    background: #333; color: #fff; border: 1px solid #666; border-radius: 6px; cursor: pointer;
  }
  .popup-edited-flag { color: #c60; font-weight: bold; font-size: 12px; }

  /* ---------- 版本號 ---------- */
  #appVersion {
    position: fixed; left: 6px; bottom: 4px; z-index: 9999;
    font-size: 10px; font-family: "SF Mono", Menlo, monospace;
    color: rgba(255, 255, 255, 0.35); pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<div id="app">

  <div id="tabs">
    <button class="tab-btn active" data-tab="register">登記模式</button>
    <button class="tab-btn" data-tab="view">檢視模式</button>
    <button class="tab-btn" data-tab="map">地圖預覽</button>
  </div>

  <!-- ===================== 登記模式 ===================== -->
  <div id="registerScreen" class="screen active">
    <button id="btnRegister" class="big-btn">📍 取得目前位置並登記地標</button>
    <div id="registerStatus"></div>
    <div id="storageUsage"></div>
    <ul id="pointList"></ul>
    <div id="emptyHint">尚未登記任何地標</div>

    <div id="labelModalOverlay" class="modal-overlay">
      <div class="modal-box">
        <div id="labelModalCoords" class="modal-coords">GPS 定位中，可以直接輸入標籤，不用等定位完成</div>
        <div id="labelModalProgress" class="modal-progress"></div>
        <input id="labelModalInput" type="text" class="modal-input" placeholder="請輸入這個地標的名稱">
        <div class="modal-photo-row">
          <input id="labelModalPhotoInput" type="file" accept="image/*" capture="environment" style="display:none">
          <button type="button" id="labelModalPhotoBtn">📷 拍照（選填）</button>
          <div id="labelModalPhotoPreview" class="modal-photo-preview" style="display:none">
            <img id="labelModalPhotoThumb" alt="照片預覽">
            <button type="button" id="labelModalPhotoRemove">移除照片</button>
          </div>
        </div>
        <div class="modal-actions">
          <button id="labelModalCancel">取消</button>
          <button id="labelModalConfirm" disabled>請輸入名稱</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== 檢視模式 ===================== -->
  <div id="viewScreen" class="screen">
    <div id="startOverlay">
      <p>檢視模式需要開啟相機、GPS 與方向感應器（羅盤）。<br>請按下開始，並允許瀏覽器的權限請求。</p>
      <button id="btnStartView" class="big-btn" style="width:260px;">▶️ 開始檢視模式</button>
      <button id="btnBackFromStart" class="secondary-btn" style="width:260px;">回登記模式</button>
    </div>

    <video id="camera" autoplay playsinline muted></video>
    <div id="overlayLayer"></div>
    <div id="orientationWarning">⚠️ 非絕對方位資料，方向可能不準確</div>

    <div id="arDetailCard">
      <button id="arDetailClose">✕ 關閉</button>
      <div id="arDetailBody"></div>
    </div>

    <div id="viewTopBar">
      <button id="btnBack">← 回登記模式</button>
      <div id="fovWrap">
        <label for="fovInput">FOV°</label>
        <input id="fovInput" type="number" value="65" min="20" max="120" step="1">
      </div>
    </div>

    <div id="diagnostics">初始化中...</div>
  </div>

  <!-- ===================== 地圖預覽 ===================== -->
  <div id="mapScreen" class="screen">
    <div id="leafletMap"></div>
    <div id="mapTopBar">
      <button id="btnRefreshMapLocation">📍 重新整理目前位置</button>
      <button id="btnToggleMeasureMode">📏 量測模式：關閉</button>
      <button id="btnClearMeasure">🧹 清除量測</button>
      <button id="btnToggleEditMode">✏️ 編輯模式：關閉</button>
      <button id="btnSelectRecent">🕐 選取最近 5 筆</button>
      <div id="mapStatus"></div>
    </div>
    <div id="measureResultBar"></div>
  </div>

</div>

<div id="appVersion"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  "use strict";

  var STORAGE_KEY = "gpsArPoints_v1";
  var APP_VERSION = "1.8.0"; // 每次改版記得同步更新

  // ---- 可調參數 ----
  var AR_RENDER_THROTTLE_MS = 150;             // 修正1: updateAR() 畫面重繪節流間隔(ms)
  var HEADING_SMOOTHING_WINDOW = 5;            // 修正2: 羅盤圓周平滑取樣數
  var LABEL_COLLISION_THRESHOLD_PERCENT = 12;  // 修正3: 視為標籤重疊的水平距離門檻(佔畫面寬度 %)
  var LABEL_COLLISION_OFFSET_PX = 60;          // 修正3: 標籤重疊時垂直錯開距離(px)
  var LIVE_POSITION_SMOOTHING_WINDOW = 5;      // 檢視模式: 目前位置滑動視窗加權平均取樣數
  var LIVE_POSITION_JUMP_THRESHOLD_M = 30;     // 檢視模式: 新讀數與目前平滑值超過此距離視為真實移動，重置緩衝區
  var DEFAULT_MAP_CENTER = [25.0330, 121.5654]; // 地圖預覽: 完全沒有登記點也沒有目前位置時的預設中心(台北市)
  var MAP_MAX_ZOOM = 19;              // 調整1: OpenStreetMap 標準圖磚可用的最大 zoom
  var MAP_TILE_ERROR_THRESHOLD = 3;   // 調整1: 同一 zoom 等級累積這麼多次圖磚載入失敗，就自動退回上一級
  var RECENT_SELECT_COUNT = 5;        // 編輯模式: 「選取最近 N 筆」一鍵選取的數量
  var PHOTO_MAX_EDGE = 800;           // 調整2: 拍照壓縮 —— 長邊縮到此像素
  var PHOTO_JPEG_QUALITY = 0.6;       // 調整2: 拍照壓縮 —— JPEG 輸出品質

  document.getElementById("appVersion").textContent = "v" + APP_VERSION;

  function uid() {
    return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
  }
  function loadPoints() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch (e) { return []; }
  }
  function savePoints(points) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(points));
  }
  function isQuotaError(e) {
    return !!e && (e.name === "QuotaExceededError" || e.name === "NS_ERROR_DOM_QUOTA_REACHED" ||
      e.code === 22 || e.code === 1014);
  }
  // 調整2: localStorage 容量保護 —— 若寫入失敗(空間已滿)且該筆帶照片，
  // 自動移除照片再存一次，不讓整筆登記失敗。回傳是否成功存檔。
  function savePointsWithQuotaGuard(points, pointBeingAdded) {
    try {
      savePoints(points);
      return true;
    } catch (e) {
      if (isQuotaError(e) && pointBeingAdded && pointBeingAdded.photo) {
        delete pointBeingAdded.photo;
        try {
          savePoints(points);
          window.alert("儲存空間已滿，此筆將不含照片儲存。");
          return true;
        } catch (e2) { /* 連無照片版本都存不下，落到下方 */ }
      }
      window.alert("儲存空間已滿，無法儲存這筆登記，請先刪除部分資料再試。");
      return false;
    }
  }
  function toRad(d) { return d * Math.PI / 180; }
  function toDeg(r) { return r * 180 / Math.PI; }

  function haversineDistance(lat1, lng1, lat2, lng2) {
    var R = 6371000;
    var dLat = toRad(lat2 - lat1);
    var dLng = toRad(lng2 - lng1);
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLng / 2) * Math.sin(dLng / 2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function bearingTo(lat1, lng1, lat2, lng2) {
    var y = Math.sin(toRad(lng2 - lng1)) * Math.cos(toRad(lat2));
    var x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
      Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lng2 - lng1));
    var brng = toDeg(Math.atan2(y, x));
    return (brng + 360) % 360;
  }

  // normalize to -180..180
  function normalizeRelative(bearing, heading) {
    var diff = ((bearing - heading + 540) % 360) - 180;
    return diff;
  }

  // 修正2: 圓周平均 —— 0°/360° 邊界不能用一般算術平均，要先轉成 sin/cos 向量再平均
  function circularMeanDegrees(anglesDeg) {
    var sumSin = 0, sumCos = 0;
    anglesDeg.forEach(function (a) {
      sumSin += Math.sin(toRad(a));
      sumCos += Math.cos(toRad(a));
    });
    var meanDeg = toDeg(Math.atan2(sumSin / anglesDeg.length, sumCos / anglesDeg.length));
    return (meanDeg + 360) % 360;
  }

  // ===================== Tabs =====================
  var tabBtns = document.querySelectorAll(".tab-btn");
  var screens = {
    register: document.getElementById("registerScreen"),
    view: document.getElementById("viewScreen"),
    map: document.getElementById("mapScreen")
  };

  function switchTab(name) {
    tabBtns.forEach(function (b) { b.classList.toggle("active", b.dataset.tab === name); });
    Object.keys(screens).forEach(function (k) { screens[k].classList.toggle("active", k === name); });
    if (name !== "view") stopViewMode();
    if (name === "map") enterMapTab();
  }
  tabBtns.forEach(function (b) {
    b.addEventListener("click", function () { switchTab(b.dataset.tab); });
  });

  // ===================== Register mode =====================
  // ---- 多次取樣加權平均 可調參數 ----
  var SAMPLE_DURATION_MS = 18000;         // 調整1: 最長收集樣本時間(原8秒拉長為18秒，測精度天花板)
  var ACCURACY_DISCARD_THRESHOLD_M = 20;  // accuracy 超過此值(公尺)直接捨棄不用
  var EARLY_STOP_MIN_SAMPLES = 6;         // 調整1: 提前結束門檻 —— 最少有效樣本數(原3筆提高為6筆)
  var EARLY_STOP_BEST_ACCURACY_M = 10;    // 提前結束門檻 —— 其中最佳一筆需 <= 此精度(公尺)，維持不變

  var btnRegister = document.getElementById("btnRegister");
  var registerStatus = document.getElementById("registerStatus");
  var pointList = document.getElementById("pointList");
  var emptyHint = document.getElementById("emptyHint");
  var labelModalOverlay = document.getElementById("labelModalOverlay");
  var labelModalProgress = document.getElementById("labelModalProgress");
  var labelModalInput = document.getElementById("labelModalInput");
  var labelModalConfirm = document.getElementById("labelModalConfirm");
  var labelModalCancel = document.getElementById("labelModalCancel");
  var labelModalPhotoInput = document.getElementById("labelModalPhotoInput");
  var labelModalPhotoBtn = document.getElementById("labelModalPhotoBtn");
  var labelModalPhotoPreview = document.getElementById("labelModalPhotoPreview");
  var labelModalPhotoThumb = document.getElementById("labelModalPhotoThumb");
  var labelModalPhotoRemove = document.getElementById("labelModalPhotoRemove");
  var storageUsage = document.getElementById("storageUsage");

  // 調整2: 顯示 localStorage 已用容量估計(字元數≈位元組數，照片 base64 為 ASCII 佔大宗)
  function updateStorageUsage() {
    var raw = localStorage.getItem(STORAGE_KEY) || "";
    var bytes = raw.length;
    var text;
    if (bytes < 1024) text = bytes + " B";
    else if (bytes < 1024 * 1024) text = (bytes / 1024).toFixed(1) + " KB";
    else text = (bytes / 1024 / 1024).toFixed(2) + " MB";
    storageUsage.textContent = "已用儲存空間估計：" + text;
  }

  // 調整1: 確認按鈕在任何狀態下文字都清楚可見，不會出現空白按鈕。
  function updateLabelModalButtons() {
    var hasLabel = labelModalInput.value.trim().length > 0;
    labelModalConfirm.disabled = !hasLabel;
    labelModalConfirm.textContent = hasLabel ? "確認" : "請輸入名稱";
    labelModalCancel.textContent = "取消";
  }

  // 調整2: 取樣與輸入標籤解耦後，「這一筆正在登記中的記錄」用這個變數代表，
  // 直到標籤已確認(labelConfirmed) 且背景取樣已完成(samplingDone) 兩者都成立，
  // 才會真正寫進 localStorage 的正式清單；在那之前完全不寫入 localStorage，
  // 只在畫面上以「定位中...」樣式顯示，重新整理分頁遺失這筆是可接受的。
  var pendingRegistration = null;

  function renderPointList() {
    var points = loadPoints();
    var displayItems = points.slice();
    if (pendingRegistration && pendingRegistration.labelConfirmed && !pendingRegistration.samplingDone) {
      displayItems.push({
        id: pendingRegistration.id,
        label: pendingRegistration.label,
        status: "sampling",
        createdAt: pendingRegistration.createdAt
      });
    }

    pointList.innerHTML = "";
    emptyHint.style.display = displayItems.length === 0 ? "block" : "none";
    displayItems.slice().reverse().forEach(function (p) {
      var li = document.createElement("li");
      var info = document.createElement("div");
      info.className = "point-info";
      if (p.status === "sampling") {
        info.innerHTML = "<b>" + escapeHtml(p.label) + "</b><br>" +
          "<span class='sampling-badge'>📡 定位中...（完成後會自動儲存）</span>";
      } else {
        info.innerHTML = "<b>" + escapeHtml(p.label) + "</b><br>" +
          p.lat.toFixed(6) + ", " + p.lng.toFixed(6) +
          " (±" + (p.accuracy != null ? p.accuracy.toFixed(1) : "?") + "m" +
          (p.sampleCount != null ? "，" + p.sampleCount + " 筆取樣" : "") + ")<br>" +
          "<span class='point-meta'>" + new Date(p.createdAt).toLocaleString() + "</span>" +
          (p.photo ? "<img class='point-thumb' src='" + p.photo + "' alt='照片'>" : "");
      }
      var delBtn = document.createElement("button");
      delBtn.className = "delete-btn";
      delBtn.textContent = "刪除";
      if (p.status === "sampling") {
        delBtn.disabled = true; // 還沒正式存檔，沒有對應的 localStorage 紀錄可刪
      } else {
        delBtn.addEventListener("click", function () {
          var all = loadPoints().filter(function (x) { return x.id !== p.id; });
          savePoints(all);
          renderPointList();
        });
      }
      li.appendChild(info);
      li.appendChild(delBtn);
      pointList.appendChild(li);
    });
    updateStorageUsage();
  }

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // 反變異數加權平均 —— accuracy 越小(越準)權重越高，經緯度分開加權平均。
  // 合併後的估計精度採用反變異數加權的標準統計式: sqrt(1 / Σ(1/accuracy_i^2))，
  // 樣本數越多、精度越好時，這個值會自然小於任何單一樣本的 accuracy。
  function weightedAverageSamples(samples) {
    var sumWeight = 0, sumLatW = 0, sumLngW = 0;
    samples.forEach(function (s) {
      var w = 1 / (s.accuracy * s.accuracy);
      sumWeight += w;
      sumLatW += s.lat * w;
      sumLngW += s.lng * w;
    });
    return {
      lat: sumLatW / sumWeight,
      lng: sumLngW / sumWeight,
      accuracy: 1 / Math.sqrt(sumWeight),
      sampleCount: samples.length
    };
  }

  // 需求3: 只要有 pendingRegistration 存在(標籤還沒確認，或已確認但背景取樣還沒完成)，
  // 「登記目前位置」按鈕就整個鎖住，避免兩組 watchPosition 同時在跑。
  function setRegisterButtonSampling(isLocked) {
    btnRegister.disabled = isLocked;
    btnRegister.textContent = isLocked ? "⏳ 請等待上一筆定位完成..." : "📍 取得目前位置並登記地標";
  }

  var samplingState = {
    active: false,
    watchId: null,
    timeoutId: null,
    rawSamples: [],   // 所有收到的原始讀數，用於顯示進度與 fallback
    validSamples: []  // 通過 ACCURACY_DISCARD_THRESHOLD_M 門檻的讀數
  };

  function stopSampling() {
    if (samplingState.watchId != null) {
      navigator.geolocation.clearWatch(samplingState.watchId);
      samplingState.watchId = null;
    }
    if (samplingState.timeoutId != null) {
      clearTimeout(samplingState.timeoutId);
      samplingState.timeoutId = null;
    }
    samplingState.active = false;
  }

  function resetPhotoUi() {
    labelModalPhotoThumb.src = "";
    labelModalPhotoPreview.style.display = "none";
    labelModalPhotoBtn.style.display = "block";
    labelModalPhotoBtn.disabled = false;
    labelModalPhotoBtn.textContent = "📷 拍照（選填）";
    labelModalPhotoInput.value = "";
  }

  function openLabelModal() {
    labelModalInput.value = "";
    updateLabelModalButtons();
    resetPhotoUi();
    labelModalProgress.textContent = "取樣中... 已收集 0 筆，等待第一筆 GPS 讀數...";
    labelModalOverlay.classList.add("active");
    labelModalInput.focus();
  }

  function closeLabelModal() {
    labelModalOverlay.classList.remove("active");
  }

  // 調整2: 用 canvas 壓縮 —— 長邊縮到 PHOTO_MAX_EDGE、輸出 JPEG(品質 PHOTO_JPEG_QUALITY)，回傳 dataURL
  function compressImageFile(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var img = new Image();
        img.onload = function () {
          var scale = Math.min(1, PHOTO_MAX_EDGE / Math.max(img.width, img.height));
          var w = Math.max(1, Math.round(img.width * scale));
          var h = Math.max(1, Math.round(img.height * scale));
          var canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", PHOTO_JPEG_QUALITY));
        };
        img.onerror = function () { reject(new Error("圖片載入失敗")); };
        img.src = reader.result;
      };
      reader.onerror = function () { reject(new Error("檔案讀取失敗")); };
      reader.readAsDataURL(file);
    });
  }

  // 調整2: 標籤確認與背景取樣完成，兩件事誰先誰後都要能正確運作 ——
  // 只有當「標籤已確認」且「取樣已完成」都成立時，才正式寫入 localStorage。
  function tryFinalizeRegistration() {
    if (!pendingRegistration) return;
    if (!pendingRegistration.labelConfirmed || !pendingRegistration.samplingDone) return;

    var result = pendingRegistration.samplingResult;
    var point = {
      id: pendingRegistration.id, lat: result.lat, lng: result.lng, label: pendingRegistration.label,
      originalLat: result.lat, originalLng: result.lng, // 編輯模式: 保留 GPS 原始測量座標，lat/lng 之後可被人工修正
      accuracy: result.accuracy, sampleCount: result.sampleCount,
      createdAt: pendingRegistration.createdAt, status: "done"
    };
    if (pendingRegistration.photo) point.photo = pendingRegistration.photo; // 沒拍照就不存此欄位(向下相容)
    var points = loadPoints();
    points.push(point);
    var saved = savePointsWithQuotaGuard(points, point); // 空間滿時會自動改存無照片版本
    if (saved) {
      registerStatus.textContent = "已登記：" + point.label + (point.photo ? "（含照片）" : "") +
        "（±" + result.accuracy.toFixed(1) + "m，" + result.sampleCount + " 筆取樣）";
    } else {
      registerStatus.textContent = "儲存失敗，未能登記：" + point.label;
    }
    pendingRegistration = null;
    setRegisterButtonSampling(false);
    renderPointList();
  }

  function completeBackgroundSampling(samples) {
    var result = weightedAverageSamples(samples);
    if (!pendingRegistration) return; // 理論上不會發生(取消時會一併中止取樣)，防禦性檢查
    pendingRegistration.samplingResult = result;
    pendingRegistration.samplingDone = true;
    if (!pendingRegistration.labelConfirmed) {
      labelModalProgress.textContent = "定位完成（±" + result.accuracy.toFixed(1) + "m，" + result.sampleCount +
        " 筆取樣），請輸入標籤後按確認";
    }
    tryFinalizeRegistration();
  }

  function abortPendingRegistration(message) {
    pendingRegistration = null;
    setRegisterButtonSampling(false);
    closeLabelModal();
    registerStatus.textContent = message;
    renderPointList();
  }

  // 需求6: 收集到的樣本全部被門檻濾掉時，詢問使用者是否仍要用最後一筆將就登記。
  // 若同意，直接把該筆讀數當成單一樣本套用同一套加權平均公式(單樣本時公式會退化成該樣本自己)。
  function handleSamplingDone() {
    stopSampling();
    var valid = samplingState.validSamples;

    if (valid.length > 0) {
      completeBackgroundSampling(valid);
      return;
    }

    if (samplingState.rawSamples.length === 0) {
      abortPendingRegistration(
        "定位逾時，" + (SAMPLE_DURATION_MS / 1000) + " 秒內未取得任何 GPS 讀數，請確認定位權限或訊號後再試一次。"
      );
      return;
    }

    var lastRaw = samplingState.rawSamples[samplingState.rawSamples.length - 1];
    var useAnyway = window.confirm(
      "目前定位品質太差（可能在室內或訊號不佳），最後一筆讀數精度 ±" + lastRaw.accuracy.toFixed(1) +
      "m，是否仍要使用這筆讀數登記？"
    );
    if (!useAnyway) {
      abortPendingRegistration("已取消，未儲存。");
      return;
    }
    completeBackgroundSampling([lastRaw]);
  }

  function onSamplePosition(pos) {
    if (!samplingState.active) return;
    var sample = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: pos.coords.accuracy
    };
    samplingState.rawSamples.push(sample);
    if (sample.accuracy <= ACCURACY_DISCARD_THRESHOLD_M) {
      samplingState.validSamples.push(sample);
    }

    var bestAccuracy = samplingState.rawSamples.reduce(function (min, s) {
      return Math.min(min, s.accuracy);
    }, Infinity);

    // 需求2: 即時顯示取樣進度，輸入框開著的話同步顯示在輸入框內
    var progressText = "取樣中... 已收集 " + samplingState.rawSamples.length + " 筆（有效 " +
      samplingState.validSamples.length + " 筆），目前最佳精度 ±" + bestAccuracy.toFixed(1) + "m";
    registerStatus.textContent = progressText;
    labelModalProgress.textContent = progressText;

    // 需求5: 提前結束取樣
    if (samplingState.validSamples.length >= EARLY_STOP_MIN_SAMPLES) {
      var bestValidAccuracy = samplingState.validSamples.reduce(function (min, s) {
        return Math.min(min, s.accuracy);
      }, Infinity);
      if (bestValidAccuracy <= EARLY_STOP_BEST_ACCURACY_M) {
        handleSamplingDone();
      }
    }
  }

  function onSampleError(err) {
    if (!samplingState.active) return;
    if (err.code === err.PERMISSION_DENIED) {
      stopSampling();
      abortPendingRegistration("定位失敗: " + err.message + " (code " + err.code + ")");
      return;
    }
    // 其他錯誤(逾時/暫時無法定位)先忽略，讓 watchPosition 有機會拿到下一筆，
    // 最終由 SAMPLE_DURATION_MS 逾時機制(handleSamplingDone)兜底處理。
  }

  labelModalInput.addEventListener("input", updateLabelModalButtons);
  labelModalInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !labelModalConfirm.disabled) labelModalConfirm.click();
  });

  // 調整2: 拍照(選填) —— 觸發相機 → 壓縮 → 縮圖預覽；完全不影響不拍照的流程
  labelModalPhotoBtn.addEventListener("click", function () { labelModalPhotoInput.click(); });
  labelModalPhotoInput.addEventListener("change", function () {
    var file = labelModalPhotoInput.files && labelModalPhotoInput.files[0];
    if (!file || !pendingRegistration) return;
    labelModalPhotoBtn.textContent = "📷 壓縮中...";
    labelModalPhotoBtn.disabled = true;
    compressImageFile(file).then(function (dataUrl) {
      if (!pendingRegistration) return; // 壓縮期間若已取消，丟棄結果
      pendingRegistration.photo = dataUrl;
      labelModalPhotoThumb.src = dataUrl;
      labelModalPhotoPreview.style.display = "flex";
      labelModalPhotoBtn.style.display = "none";
      labelModalPhotoBtn.disabled = false;
      labelModalPhotoBtn.textContent = "📷 拍照（選填）";
    }).catch(function (err) {
      labelModalPhotoBtn.disabled = false;
      labelModalPhotoBtn.textContent = "📷 拍照（選填）";
      window.alert("照片處理失敗：" + err.message);
    });
    labelModalPhotoInput.value = ""; // 允許重拍同一張檔案
  });
  labelModalPhotoRemove.addEventListener("click", function () {
    if (pendingRegistration) delete pendingRegistration.photo;
    resetPhotoUi();
  });

  labelModalConfirm.addEventListener("click", function () {
    var label = labelModalInput.value.trim();
    if (!label || !pendingRegistration) return;
    pendingRegistration.label = label;
    pendingRegistration.labelConfirmed = true;
    closeLabelModal();
    renderPointList(); // 需求4: 立刻在列表顯示「定位中...」的這一筆
    tryFinalizeRegistration(); // 如果背景取樣其實已經先跑完了，這裡會直接完成存檔
  });

  labelModalCancel.addEventListener("click", function () {
    stopSampling();
    abortPendingRegistration("已取消，未儲存。");
  });

  btnRegister.addEventListener("click", function () {
    if (samplingState.active || pendingRegistration) return; // 需求3: 上一筆還沒結束就整個鎖住
    if (!("geolocation" in navigator)) {
      registerStatus.textContent = "此裝置/瀏覽器不支援 GPS 定位";
      return;
    }

    pendingRegistration = {
      id: uid(), label: null, labelConfirmed: false,
      samplingResult: null, samplingDone: false,
      createdAt: new Date().toISOString()
    };

    samplingState.active = true;
    samplingState.rawSamples = [];
    samplingState.validSamples = [];
    setRegisterButtonSampling(true);
    registerStatus.textContent = "取樣中... 已收集 0 筆，等待第一筆 GPS 讀數...";
    openLabelModal(); // 需求2: 立刻彈出輸入框，不用等取樣完成

    samplingState.watchId = navigator.geolocation.watchPosition(
      onSamplePosition,
      onSampleError,
      { enableHighAccuracy: true, maximumAge: 0, timeout: SAMPLE_DURATION_MS }
    );
    samplingState.timeoutId = setTimeout(handleSamplingDone, SAMPLE_DURATION_MS);
  });

  renderPointList();

  // ===================== View / AR mode =====================
  var btnStartView = document.getElementById("btnStartView");
  var btnBack = document.getElementById("btnBack");
  var btnBackFromStart = document.getElementById("btnBackFromStart");
  var startOverlay = document.getElementById("startOverlay");
  var video = document.getElementById("camera");
  var overlayLayer = document.getElementById("overlayLayer");
  var diagnostics = document.getElementById("diagnostics");
  var orientationWarning = document.getElementById("orientationWarning");
  var fovInput = document.getElementById("fovInput");
  var arDetailCard = document.getElementById("arDetailCard");
  var arDetailClose = document.getElementById("arDetailClose");
  var arDetailBody = document.getElementById("arDetailBody");

  var viewState = {
    stream: null,
    watchId: null,
    rafId: null,           // 修正1: requestAnimationFrame 節流迴圈 id
    lastRenderTime: 0,     // 修正1: 上次實際重繪 updateAR() 的時間戳記
    currentPosition: null, // {lat, lng, accuracy} —— 平滑後供距離/方位角計算使用
    positionBuffer: [],    // 檢視模式: 最近 N 筆原始 GPS 讀數 {lat,lng,accuracy,timestamp}，用於滑動視窗加權平均
    currentHeading: null,  // degrees, 0-360, 0 = true north (已平滑後的值)
    headingSource: "尚無方位資料",
    headingIsFallback: false,
    headingBuffer: [],     // 修正2: 最近 N 筆原始羅盤讀數，用於圓周平滑
    headingSourceKey: null,// 修正2: 目前平滑取樣所屬的方位來源，來源切換時要重置緩衝區
    compassAccuracy: null, // 修正2: iOS webkitCompassAccuracy
    gotAbsolute: false,
    gotIosCompass: false,
    markerEls: {},
    orientationHandlersAttached: false,
    openDetailPointId: null // 調整3: 目前打開詳情卡片的登記點 id(null 表示未開)
  };

  // 調整3: 點擊 AR 標籤打開詳情卡片。距離在 updateAR() 每幀更新(見 #arDetailDist)，
  // 其餘欄位為打開當下的快照；卡片保留直列式排版供之後擴充。
  function openArDetail(pointId) {
    var p = loadPoints().filter(function (x) { return x.id === pointId; })[0];
    if (!p) return;
    viewState.openDetailPointId = pointId;
    var rows = [];
    rows.push("<h3>" + escapeHtml(p.label) + "</h3>");
    rows.push("<div class='ar-detail-row'><span>目前距離</span><b id='arDetailDist'>計算中...</b></div>");
    rows.push("<div class='ar-detail-row'><span>登記時間</span><b>" + escapeHtml(new Date(p.createdAt).toLocaleString()) + "</b></div>");
    rows.push("<div class='ar-detail-row'><span>登記時精度</span><b>±" + (p.accuracy != null ? p.accuracy.toFixed(1) : "?") + " m</b></div>");
    rows.push("<div class='ar-detail-row'><span>取樣筆數</span><b>" + (p.sampleCount != null ? p.sampleCount : "?") + "</b></div>");
    rows.push("<div class='ar-detail-row'><span>人工修正</span><b>" + (isPointEdited(p) ? escapeHtml(editedFlagText(p)) : "未修正") + "</b></div>");
    if (p.photo) rows.push("<img class='ar-detail-photo' src='" + p.photo + "' alt='現場照片'>");
    arDetailBody.innerHTML = rows.join("");
    arDetailCard.classList.add("active");
  }

  function closeArDetail() {
    arDetailCard.classList.remove("active");
    viewState.openDetailPointId = null;
  }
  arDetailClose.addEventListener("click", closeArDetail);

  // 修正2: 收到新的原始羅盤讀數時，先做圓周平滑再寫入 currentHeading。
  // 來源切換(例如從 fallback 換成絕對方位)時清空緩衝區，避免不同來源的角度混在一起平均。
  function pushHeadingSample(rawHeadingDeg, sourceKey) {
    if (viewState.headingSourceKey !== sourceKey) {
      viewState.headingSourceKey = sourceKey;
      viewState.headingBuffer = [];
    }
    viewState.headingBuffer.push(rawHeadingDeg);
    if (viewState.headingBuffer.length > HEADING_SMOOTHING_WINDOW) {
      viewState.headingBuffer.shift();
    }
    viewState.currentHeading = circularMeanDegrees(viewState.headingBuffer);
  }

  function absoluteOrientationHandler(e) {
    if (e.alpha === null || e.alpha === undefined) return;
    viewState.gotAbsolute = true;
    var raw = (360 - e.alpha) % 360;
    pushHeadingSample(raw, "android-absolute");
    viewState.headingSource = "Android 絕對方位 (deviceorientationabsolute)";
    viewState.headingIsFallback = false;
  }

  function orientationHandler(e) {
    if (typeof e.webkitCompassHeading === "number" && !isNaN(e.webkitCompassHeading)) {
      viewState.gotIosCompass = true;
      viewState.compassAccuracy = (typeof e.webkitCompassAccuracy === "number" && e.webkitCompassAccuracy >= 0)
        ? e.webkitCompassAccuracy : null;
      pushHeadingSample(e.webkitCompassHeading, "ios");
      viewState.headingSource = "iOS 羅盤 (webkitCompassHeading)";
      viewState.headingIsFallback = false;
      return;
    }
    if (viewState.gotAbsolute) return; // absolute event already provides heading
    if (e.alpha === null || e.alpha === undefined) return;
    pushHeadingSample(e.alpha, "fallback");
    viewState.headingSource = "⚠️ 非絕對方位 (deviceorientation alpha)";
    viewState.headingIsFallback = true;
  }

  function attachOrientationListeners() {
    if (viewState.orientationHandlersAttached) return;
    window.addEventListener("deviceorientationabsolute", absoluteOrientationHandler);
    window.addEventListener("deviceorientation", orientationHandler);
    viewState.orientationHandlersAttached = true;
  }

  function detachOrientationListeners() {
    if (!viewState.orientationHandlersAttached) return;
    window.removeEventListener("deviceorientationabsolute", absoluteOrientationHandler);
    window.removeEventListener("deviceorientation", orientationHandler);
    viewState.orientationHandlersAttached = false;
  }

  function startOrientation() {
    var hasIosPermissionApi = typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function";
    if (hasIosPermissionApi) {
      // 必須在使用者按鈕點擊事件中直接呼叫，不能自動觸發
      DeviceOrientationEvent.requestPermission().then(function (state) {
        if (state === "granted") {
          attachOrientationListeners();
        } else {
          viewState.headingSource = "羅盤權限被拒絕";
        }
      }).catch(function (err) {
        viewState.headingSource = "羅盤權限請求錯誤: " + err.message;
      });
    } else {
      attachOrientationListeners();
    }
  }

  function startCamera() {
    return navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    }).then(function (stream) {
      viewState.stream = stream;
      video.srcObject = stream;
      return video.play();
    });
  }

  // 檢視模式的目前位置平滑 —— 跟登記模式同一套反變異數加權平均邏輯(weightedAverageSamples)，
  // 但不能像登記模式等好幾秒，而是用「最近 N 筆的滑動視窗」即時平滑，站著不動時能濾掉
  // GPS 原始讀數的小幅跳動；如果新讀數距離目前平滑值太遠，視為使用者真的移動了一大段，
  // 直接清空緩衝區重新累積，避免平滑造成「明明走過去了畫面還顯示很遠」的延遲感。
  function updateLivePosition(rawSample) {
    if (viewState.positionBuffer.length > 0) {
      var currentAvg = weightedAverageSamples(viewState.positionBuffer);
      var jumpDist = haversineDistance(currentAvg.lat, currentAvg.lng, rawSample.lat, rawSample.lng);
      if (jumpDist > LIVE_POSITION_JUMP_THRESHOLD_M) {
        viewState.positionBuffer = [];
      }
    }

    viewState.positionBuffer.push(rawSample);
    if (viewState.positionBuffer.length > LIVE_POSITION_SMOOTHING_WINDOW) {
      viewState.positionBuffer.shift();
    }

    var smoothed = weightedAverageSamples(viewState.positionBuffer);
    viewState.currentPosition = { lat: smoothed.lat, lng: smoothed.lng, accuracy: smoothed.accuracy };
  }

  function startGeoWatch() {
    if (!("geolocation" in navigator)) {
      diagnostics.textContent = "此裝置/瀏覽器不支援 GPS 定位";
      return;
    }
    viewState.watchId = navigator.geolocation.watchPosition(
      function (pos) {
        updateLivePosition({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy,
          timestamp: pos.timestamp
        });
      },
      function (err) {
        diagnostics.textContent = "GPS 錯誤: " + err.message + " (code " + err.code + ")";
      },
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
    );
  }

  function ensureMarkerEl(point) {
    var el = viewState.markerEls[point.id];
    if (!el) {
      el = document.createElement("div");
      el.className = "marker";
      el.dataset.pointId = point.id;
      // 調整3: 點擊標籤看詳情。因標籤重疊時會垂直錯開成不重疊，點擊命中的就是螢幕上那一個。
      el.addEventListener("click", function () {
        if (el.dataset.pointId) openArDetail(el.dataset.pointId);
      });
      overlayLayer.appendChild(el);
      viewState.markerEls[point.id] = el;
    }
    return el;
  }

  function cleanupMarkerEls(validIds) {
    Object.keys(viewState.markerEls).forEach(function (id) {
      if (validIds.indexOf(id) === -1) {
        overlayLayer.removeChild(viewState.markerEls[id]);
        delete viewState.markerEls[id];
      }
    });
  }

  function updateAR() {
    var points = loadPoints();
    var fov = parseFloat(fovInput.value);
    if (!fov || isNaN(fov)) fov = 65;
    fov = Math.max(20, Math.min(120, fov));
    var halfFov = fov / 2;

    orientationWarning.style.display = viewState.headingIsFallback ? "block" : "none";

    var diagLines = [];
    diagLines.push("=== 診斷資訊 ===");
    if (viewState.currentPosition) {
      diagLines.push("GPS: " + viewState.currentPosition.lat.toFixed(6) + ", " + viewState.currentPosition.lng.toFixed(6) +
        "  accuracy: ±" + viewState.currentPosition.accuracy.toFixed(1) + "m");
    } else {
      diagLines.push("GPS: 尚未取得定位");
    }
    diagLines.push("方位角: " + (viewState.currentHeading != null ? viewState.currentHeading.toFixed(1) + "°" : "N/A") +
      "  來源: " + viewState.headingSource);
    diagLines.push("羅盤精度: " + (viewState.compassAccuracy != null ? "±" + viewState.compassAccuracy.toFixed(1) + "°" : "無法取得"));
    diagLines.push("FOV: " + fov + "° (±" + halfFov + "°)");
    diagLines.push("--- 標記點 (" + points.length + ") ---");

    var validIds = [];
    var entries = [];

    // 第一階段：只計算每個點的方位角/距離/相對夾角，先不動 DOM，
    // 因為修正3的重疊避讓要等全部算完、依水平位置排序後才能決定要不要垂直錯開。
    points.forEach(function (p) {
      validIds.push(p.id);
      var el = ensureMarkerEl(p);
      var regAccuracyText = "登記時精度 ±" + (p.accuracy != null ? p.accuracy.toFixed(1) : "?") + "m";

      if (!viewState.currentPosition || viewState.currentHeading == null) {
        el.style.display = "none";
        diagLines.push(p.label + ": 等待 GPS/方位資料... (" + regAccuracyText + ")");
        return;
      }

      var dist = haversineDistance(
        viewState.currentPosition.lat, viewState.currentPosition.lng, p.lat, p.lng
      );
      var brg = bearingTo(
        viewState.currentPosition.lat, viewState.currentPosition.lng, p.lat, p.lng
      );
      var rel = normalizeRelative(brg, viewState.currentHeading);
      var inView = Math.abs(rel) <= halfFov;
      var xPercent = 50 + (rel / halfFov) * 50;

      entries.push({
        p: p, el: el, dist: dist, brg: brg, rel: rel, inView: inView,
        xPercent: xPercent, regAccuracyText: regAccuracyText, verticalOffset: 0
      });
    });

    // 修正3：標籤重疊碰撞避讓 —— 依水平位置排序，同一水平叢集內的標籤逐級往下錯開。
    // 用「累加階層」而非二值交錯：3 個以上幾乎同位的標籤會排成 0/60/120px 而非 0/60/0，
    // 確保沒有兩個水平重疊的標籤落在同一列，點擊時才能穩定命中畫面上看到的那一個(調整3)。
    var visible = entries.filter(function (e) { return e.inView; });
    visible.sort(function (a, b) { return a.xPercent - b.xPercent; });
    var prevX = null;
    var stackLevel = 0;
    visible.forEach(function (entry) {
      if (prevX !== null && Math.abs(entry.xPercent - prevX) < LABEL_COLLISION_THRESHOLD_PERCENT) {
        stackLevel += 1;
      } else {
        stackLevel = 0;
      }
      entry.verticalOffset = stackLevel * LABEL_COLLISION_OFFSET_PX;
      prevX = entry.xPercent;
    });

    // 第二階段：套用到固定的 DOM 節點（每個登記點只有一個節點，重複使用，只改 style/文字）
    entries.forEach(function (entry) {
      var el = entry.el;
      if (entry.inView) {
        el.style.left = entry.xPercent + "%";
        el.style.top = "calc(42% + " + entry.verticalOffset + "px)";
        el.style.display = "block";
        el.innerHTML = escapeHtml(entry.p.label) + "<span class='marker-dist'>" + entry.dist.toFixed(1) + " m</span>";
      } else {
        el.style.display = "none";
      }
      diagLines.push(
        entry.p.label + ": bearing=" + entry.brg.toFixed(1) + "° dist=" + entry.dist.toFixed(1) + "m rel=" + entry.rel.toFixed(1) +
        "° inView=" + (entry.inView ? "YES" : "no") + " (" + entry.regAccuracyText + ")"
      );
    });
    cleanupMarkerEls(validIds);

    // 調整3: 詳情卡片打開期間，背景標籤持續更新，卡片上的「目前距離」也一起即時更新
    if (viewState.openDetailPointId != null) {
      var distEl = document.getElementById("arDetailDist");
      if (distEl) {
        var match = entries.filter(function (e) { return e.p.id === viewState.openDetailPointId; })[0];
        distEl.textContent = (match && viewState.currentPosition) ? match.dist.toFixed(1) + " m" : "無法計算";
      }
    }

    diagnostics.innerHTML = diagLines.map(escapeHtml).join("\n");
  }

  // 修正1：畫面重繪節流 —— 用 rAF 迴圈持續跑，但每 AR_RENDER_THROTTLE_MS 才真正執行一次 updateAR()。
  // 羅盤事件觸發頻率很高，但只更新 viewState.currentHeading 這個變數本身(見 orientationHandler)，
  // 實際重繪畫面(含診斷區塊、標籤位置)則由這個節流後的迴圈驅動，避免每次事件都整個重繪。
  function arRenderLoop(now) {
    if (now - viewState.lastRenderTime >= AR_RENDER_THROTTLE_MS) {
      viewState.lastRenderTime = now;
      updateAR();
    }
    viewState.rafId = requestAnimationFrame(arRenderLoop);
  }

  function startViewMode() {
    diagnostics.textContent = "啟動相機/GPS/羅盤中...";
    startOrientation(); // 必須直接在點擊事件呼叫鏈內，不能延遲到 promise 之後
    startGeoWatch();
    startCamera().then(function () {
      startOverlay.style.display = "none";
      viewState.lastRenderTime = 0;
      if (viewState.rafId) cancelAnimationFrame(viewState.rafId);
      viewState.rafId = requestAnimationFrame(arRenderLoop);
    }).catch(function (err) {
      diagnostics.textContent = "相機啟動失敗: " + err.message;
    });
  }

  function stopViewMode() {
    if (viewState.stream) {
      viewState.stream.getTracks().forEach(function (t) { t.stop(); });
      viewState.stream = null;
    }
    video.srcObject = null;
    if (viewState.watchId != null) {
      navigator.geolocation.clearWatch(viewState.watchId);
      viewState.watchId = null;
    }
    if (viewState.rafId) {
      cancelAnimationFrame(viewState.rafId);
      viewState.rafId = null;
    }
    viewState.lastRenderTime = 0;
    detachOrientationListeners();
    viewState.currentPosition = null;
    viewState.positionBuffer = [];
    viewState.currentHeading = null;
    viewState.headingSource = "尚無方位資料";
    viewState.headingIsFallback = false;
    viewState.headingBuffer = [];
    viewState.headingSourceKey = null;
    viewState.compassAccuracy = null;
    viewState.gotAbsolute = false;
    viewState.gotIosCompass = false;
    Object.keys(viewState.markerEls).forEach(function (id) {
      overlayLayer.removeChild(viewState.markerEls[id]);
    });
    viewState.markerEls = {};
    closeArDetail(); // 調整3: 離開檢視模式時關閉詳情卡片
    startOverlay.style.display = "flex";
    diagnostics.textContent = "初始化中...";
  }

  btnStartView.addEventListener("click", startViewMode);
  btnBack.addEventListener("click", function () { switchTab("register"); });
  btnBackFromStart.addEventListener("click", function () { switchTab("register"); });

  // ===================== 地圖預覽 =====================
  // 檢視 + 量測 + 編輯：讀取 localStorage 登記點做視覺化；編輯模式可拖曳修正座標，
  // lat/lng 為「目前生效座標」(AR 檢視/量測都讀它)，originalLat/originalLng 保留 GPS 原始值，
  // editHistory 記錄每次人工修正供回溯。
  var btnRefreshMapLocation = document.getElementById("btnRefreshMapLocation");
  var btnToggleMeasureMode = document.getElementById("btnToggleMeasureMode");
  var btnClearMeasure = document.getElementById("btnClearMeasure");
  var btnToggleEditMode = document.getElementById("btnToggleEditMode");
  var btnSelectRecent = document.getElementById("btnSelectRecent");
  var mapStatus = document.getElementById("mapStatus");
  var measureResultBar = document.getElementById("measureResultBar");

  var leafletMap = null;
  var mapMarkersLayer = null;
  var mapCurrentLocationMarker = null;
  var mapAutoFetchedLocationOnce = false;

  // 調整2: 量測模式狀態
  var measureModeActive = false;
  var mapMarkerRefs = [];       // {point, marker} 供選取樣式套用與模式切換重繪
  var measureFirstPoint = null; // 目前選取的量測起點 {point, marker}
  var measureActiveMarkers = []; // 目前套用「已選取」圖示的 marker，供清除時還原成預設圖示
  var measureLine = null;       // 兩點間的量測連線 (L.Polyline)
  var measureSelectedIcon = L.divIcon({
    className: "measure-selected-icon",
    html: "<div class='measure-selected-icon-inner'></div>",
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });

  // 編輯模式狀態
  var editModeActive = false;
  var editSelectedIds = []; // 已選取(可拖曳)的登記點 id 集合
  var editSelectedIcon = L.divIcon({
    className: "edit-selected-icon",
    html: "<div class='edit-selected-icon-inner'></div>",
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });

  function initMapIfNeeded() {
    if (leafletMap) return;
    leafletMap = L.map("leafletMap", { attributionControl: true }).setView(DEFAULT_MAP_CENTER, 15);
    var tileLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: MAP_MAX_ZOOM,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(leafletMap);
    mapMarkersLayer = L.layerGroup().addTo(leafletMap);

    // 調整1: 偏僻地點常常在高 zoom 等級沒有圖磚資料(伺服器回404觸發 tileerror)，
    // 累積同一 zoom 等級的失敗次數，超過門檻就自動退回上一級，不讓畫面卡在空白/模糊狀態。
    var tileErrorCounts = {};
    tileLayer.on("tileerror", function () {
      var z = leafletMap.getZoom();
      tileErrorCounts[z] = (tileErrorCounts[z] || 0) + 1;
      if (tileErrorCounts[z] >= MAP_TILE_ERROR_THRESHOLD && z > leafletMap.getMinZoom()) {
        leafletMap.setZoom(z - 1);
      }
    });
    leafletMap.on("zoomstart", function () {
      tileErrorCounts = {};
    });
  }

  // 調整2: 量測模式下點擊 marker 不開彈出視窗，改成選取量測起點/終點。
  function onMapMarkerClick(point, marker) {
    if (!measureModeActive) return;
    if (measureFirstPoint && measureFirstPoint.point.id === point.id) return; // 同一點不重複處理

    if (!measureFirstPoint) {
      // 需求2: 上一輪量測已結束(或還沒開始)時點任一 marker，都視為開始新一輪，先清掉舊的連線/選取樣式
      clearMeasurementVisuals();
      measureFirstPoint = { point: point, marker: marker };
      marker.setIcon(measureSelectedIcon);
      measureActiveMarkers.push(marker);
      measureResultBar.textContent = "量測模式：已選「" + point.label + "」，請點選第二個登記點...";
      measureResultBar.style.display = "block";
      return;
    }

    var first = measureFirstPoint;
    var dist = haversineDistance(first.point.lat, first.point.lng, point.lat, point.lng);
    measureLine = L.polyline(
      [[first.point.lat, first.point.lng], [point.lat, point.lng]],
      { color: "#ffcc00", weight: 3, dashArray: "6,8" }
    ).addTo(leafletMap);
    measureLine.bindTooltip(dist.toFixed(1) + " m", {
      permanent: true, direction: "center", className: "measure-distance-tooltip"
    }).openTooltip();
    marker.setIcon(measureSelectedIcon);
    measureActiveMarkers.push(marker);
    measureResultBar.textContent = first.point.label + " → " + point.label + "：" + dist.toFixed(1) + " 公尺";
    measureResultBar.style.display = "block";
    measureFirstPoint = null; // 回到「等待下一輪新起點」狀態；下次點擊任一 marker 即開始新一輪量測
  }

  // 需求2: 清除所有選取樣式與量測結果(切換量測模式開關、按下清除按鈕、或重新進入頁籤時呼叫)
  function clearMeasurementVisuals() {
    measureActiveMarkers.forEach(function (m) { m.setIcon(new L.Icon.Default()); });
    measureActiveMarkers = [];
    if (measureLine) {
      leafletMap.removeLayer(measureLine);
      measureLine = null;
    }
    measureFirstPoint = null;
    measureResultBar.textContent = "";
    measureResultBar.style.display = "none";
  }

  // 與編輯模式互斥：開啟其中一個會自動關閉另一個(關閉方向不會反向觸發，不會遞迴)
  function setMeasureMode(active) {
    if (active && editModeActive) setEditMode(false);
    measureModeActive = active;
    clearMeasurementVisuals();
    renderMapMarkers(); // 重繪以依模式重新綁定 popup(量測模式下 marker 不綁 popup)
    btnToggleMeasureMode.textContent = measureModeActive ? "📏 量測模式：開啟" : "📏 量測模式：關閉";
    btnClearMeasure.style.display = measureModeActive ? "inline-block" : "none";
    if (measureModeActive) {
      measureResultBar.textContent = "量測模式：請點選第一個登記點...";
      measureResultBar.style.display = "block";
    }
  }

  // ---------- 編輯模式 ----------
  function isPointEdited(p) {
    return !!(p.editHistory && p.editHistory.length > 0);
  }

  function editedFlagText(p) {
    var last = p.editHistory[p.editHistory.length - 1];
    return "已人工修正（最後修正: " + new Date(last.editedAt).toLocaleString() + "）";
  }

  function setEditMode(active) {
    if (active && measureModeActive) setMeasureMode(false);
    editModeActive = active;
    editSelectedIds = [];
    renderMapMarkers();
    btnToggleEditMode.textContent = editModeActive ? "✏️ 編輯模式：開啟" : "✏️ 編輯模式：關閉";
    btnSelectRecent.style.display = editModeActive ? "inline-block" : "none";
    if (editModeActive) {
      measureResultBar.textContent = "編輯模式：點擊登記點選取/取消，拖曳已選取的點可批次移動";
      measureResultBar.style.display = "block";
    } else {
      measureResultBar.textContent = "";
      measureResultBar.style.display = "none";
    }
  }

  // 依 editSelectedIds 套用選取樣式與可拖曳狀態(只有已選取的 marker 可拖曳)
  function applySelectionVisuals() {
    mapMarkerRefs.forEach(function (ref) {
      var selected = editSelectedIds.indexOf(ref.point.id) !== -1;
      ref.marker.setIcon(selected ? editSelectedIcon : new L.Icon.Default());
      if (ref.marker.dragging) {
        if (selected && editModeActive) ref.marker.dragging.enable();
        else ref.marker.dragging.disable();
      }
    });
  }

  function updateEditStatusBar() {
    measureResultBar.textContent = editSelectedIds.length > 0
      ? "編輯模式：已選取 " + editSelectedIds.length + " 筆，拖曳任一選取點可批次移動"
      : "編輯模式：點擊登記點選取/取消，拖曳已選取的點可批次移動";
    measureResultBar.style.display = "block";
  }

  function onEditMarkerClick(point, marker) {
    if (!editModeActive) return;
    var idx = editSelectedIds.indexOf(point.id);
    if (idx === -1) editSelectedIds.push(point.id);
    else editSelectedIds.splice(idx, 1);
    applySelectionVisuals();
    updateEditStatusBar();
  }

  function selectRecentPoints() {
    var sorted = loadPoints().slice().sort(function (a, b) {
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    editSelectedIds = sorted.slice(0, RECENT_SELECT_COUNT).map(function (p) { return p.id; });
    applySelectionVisuals();
    measureResultBar.textContent = "編輯模式：已選取最近 " + editSelectedIds.length + " 筆，拖曳任一選取點可批次移動";
    measureResultBar.style.display = "block";
  }

  // 拖曳放開 → 確認後才寫入 localStorage；取消則從 localStorage 重繪，所有 marker 彈回原位
  function onEditMarkerDragEnd(point, marker) {
    if (!editModeActive || editSelectedIds.indexOf(point.id) === -1) {
      renderMapMarkers();
      return;
    }
    var target = marker.getLatLng();
    var points = loadPoints();
    var selected = points.filter(function (p) { return editSelectedIds.indexOf(p.id) !== -1; });
    var labelList = selected.map(function (p) { return "・" + p.label; }).join("\n");
    var ok = window.confirm("確定將 " + selected.length + " 筆記錄移動到此位置？\n\n" + labelList);
    if (!ok) {
      renderMapMarkers(); // 未落地，重繪即彈回原位；選取狀態保留(renderMapMarkers 會重新套用)
      return;
    }
    var now = new Date().toISOString();
    points.forEach(function (p) {
      if (editSelectedIds.indexOf(p.id) === -1) return;
      // 舊資料第一次被編輯時，先把當時的 lat/lng 複製進 original 欄位再修改
      if (p.originalLat == null || p.originalLng == null) {
        p.originalLat = p.lat;
        p.originalLng = p.lng;
      }
      if (!p.editHistory) p.editHistory = [];
      p.editHistory.push({ editedAt: now, fromLat: p.lat, fromLng: p.lng, toLat: target.lat, toLng: target.lng });
      p.lat = target.lat;
      p.lng = target.lng;
    });
    savePoints(points);
    editSelectedIds = [];
    renderMapMarkers();
    measureResultBar.textContent = "編輯模式：已移動 " + selected.length + " 筆記錄";
    measureResultBar.style.display = "block";
  }

  // 編輯模式 popup：狀態 + 還原上一步 / 還原 GPS 原始位置(都經確認框才寫入)
  function buildEditPopupContent(p) {
    var div = document.createElement("div");
    var edited = isPointEdited(p);
    var head = document.createElement("div");
    head.innerHTML = "<b>" + escapeHtml(p.label) + "</b><br>目前座標: " + p.lat.toFixed(6) + ", " + p.lng.toFixed(6);
    div.appendChild(head);

    var status = document.createElement("div");
    status.className = "edit-popup-status" + (edited ? " edited" : "");
    status.textContent = edited ? editedFlagText(p) : "GPS 原始";
    div.appendChild(status);

    if (edited) {
      var actions = document.createElement("div");
      actions.className = "edit-popup-actions";

      var undoBtn = document.createElement("button");
      undoBtn.textContent = "↩️ 還原上一步";
      undoBtn.addEventListener("click", function () {
        if (!window.confirm("確定還原「" + p.label + "」上一步修正？")) return;
        var points = loadPoints();
        points.forEach(function (x) {
          if (x.id !== p.id || !x.editHistory || x.editHistory.length === 0) return;
          var h = x.editHistory.pop();
          x.lat = h.fromLat;
          x.lng = h.fromLng;
        });
        savePoints(points);
        leafletMap.closePopup();
        renderMapMarkers();
      });
      actions.appendChild(undoBtn);

      if (p.originalLat != null && p.originalLng != null) {
        var restoreBtn = document.createElement("button");
        restoreBtn.textContent = "📡 還原 GPS 原始位置";
        restoreBtn.addEventListener("click", function () {
          if (!window.confirm("確定將「" + p.label + "」還原到 GPS 原始位置？此動作會清空編輯歷史。")) return;
          var points = loadPoints();
          points.forEach(function (x) {
            if (x.id !== p.id) return;
            x.lat = x.originalLat;
            x.lng = x.originalLng;
            x.editHistory = [];
          });
          savePoints(points);
          leafletMap.closePopup();
          renderMapMarkers();
        });
        actions.appendChild(restoreBtn);
      }
      div.appendChild(actions);
    }
    return div;
  }

  function buildNormalPopupHtml(p) {
    var gmapsUrl = "https://www.google.com/maps/search/?api=1&query=" + p.lat + "," + p.lng;
    return "<b>" + escapeHtml(p.label) + "</b><br>" +
      (isPointEdited(p) ? "<span class='popup-edited-flag'>⚠️ " + editedFlagText(p) + "</span><br>" : "") +
      "登記時間: " + new Date(p.createdAt).toLocaleString() + "<br>" +
      "登記時精度: ±" + (p.accuracy != null ? p.accuracy.toFixed(1) : "?") + "m<br>" +
      "<a href='" + gmapsUrl + "' target='_blank' rel='noopener noreferrer'>在 Google 地圖開啟</a>";
  }

  function renderMapMarkers() {
    mapMarkersLayer.clearLayers();
    mapMarkerRefs = [];
    loadPoints().forEach(function (p) {
      var marker = L.marker([p.lat, p.lng]).addTo(mapMarkersLayer);
      if (editModeActive) {
        marker.bindPopup(buildEditPopupContent(p));
      } else if (!measureModeActive) {
        marker.bindPopup(buildNormalPopupHtml(p));
      }
      marker.on("click", function () {
        if (measureModeActive) onMapMarkerClick(p, marker);
        else if (editModeActive) onEditMarkerClick(p, marker);
      });
      marker.on("dragend", function () { onEditMarkerDragEnd(p, marker); });
      mapMarkerRefs.push({ point: p, marker: marker });
    });
    if (editModeActive) applySelectionVisuals();
  }

  // 需求3: 涵蓋所有登記點 + 目前位置(若有)；沒有登記點就以目前位置為中心；都沒有就用預設中心點。
  function fitMapView() {
    var pointLatLngs = loadPoints().map(function (p) { return [p.lat, p.lng]; });

    if (pointLatLngs.length > 0) {
      var allLatLngs = pointLatLngs.slice();
      if (mapCurrentLocationMarker) allLatLngs.push(mapCurrentLocationMarker.getLatLng());
      if (allLatLngs.length === 1) {
        leafletMap.setView(allLatLngs[0], 17);
      } else {
        leafletMap.fitBounds(L.latLngBounds(allLatLngs), { padding: [40, 40] });
      }
    } else if (mapCurrentLocationMarker) {
      leafletMap.setView(mapCurrentLocationMarker.getLatLng(), 17);
    } else {
      leafletMap.setView(DEFAULT_MAP_CENTER, 15);
    }
  }

  function refreshMapCurrentLocation() {
    if (!("geolocation" in navigator)) {
      mapStatus.textContent = "此裝置/瀏覽器不支援 GPS 定位";
      return;
    }
    mapStatus.textContent = "定位中...";
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        var latLng = [pos.coords.latitude, pos.coords.longitude];
        if (mapCurrentLocationMarker) {
          mapCurrentLocationMarker.setLatLng(latLng);
        } else {
          mapCurrentLocationMarker = L.circleMarker(latLng, {
            radius: 8, color: "#1a73e8", fillColor: "#1a73e8", fillOpacity: 0.9, weight: 2
          }).addTo(leafletMap).bindPopup("目前位置");
        }
        mapStatus.textContent = "";
        fitMapView();
      },
      function (err) {
        mapStatus.textContent = "定位失敗: " + err.message + " (code " + err.code + ")";
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
    );
  }

  function enterMapTab() {
    initMapIfNeeded();

    // 每次重新進入頁籤都還原成未量測/未編輯狀態：markers 即將被 renderMapMarkers() 整組換新，
    // 舊的量測連線/選取樣式參照的是即將銷毀的 marker 物件，直接重置狀態避免殘留。
    measureModeActive = false;
    measureFirstPoint = null;
    measureActiveMarkers = [];
    if (measureLine) {
      leafletMap.removeLayer(measureLine);
      measureLine = null;
    }
    btnToggleMeasureMode.textContent = "📏 量測模式：關閉";
    btnClearMeasure.style.display = "none";
    editModeActive = false;
    editSelectedIds = [];
    btnToggleEditMode.textContent = "✏️ 編輯模式：關閉";
    btnSelectRecent.style.display = "none";
    measureResultBar.textContent = "";
    measureResultBar.style.display = "none";

    renderMapMarkers();
    fitMapView();
    // 剛從 display:none 切成可見時容器尺寸才會確定，下一輪畫面更新後要通知 Leaflet 重新量測。
    requestAnimationFrame(function () {
      leafletMap.invalidateSize();
      fitMapView();
    });
    if (!mapAutoFetchedLocationOnce) {
      mapAutoFetchedLocationOnce = true;
      refreshMapCurrentLocation(); // 需求3: 只在第一次進入時自動抓一次，之後靠手動按鈕更新，避免不必要耗電
    }
  }

  btnRefreshMapLocation.addEventListener("click", refreshMapCurrentLocation);
  btnToggleMeasureMode.addEventListener("click", function () { setMeasureMode(!measureModeActive); });
  btnClearMeasure.addEventListener("click", function () {
    clearMeasurementVisuals();
    if (measureModeActive) {
      measureResultBar.textContent = "量測模式：請點選第一個登記點...";
      measureResultBar.style.display = "block";
    }
  });
  btnToggleEditMode.addEventListener("click", function () { setEditMode(!editModeActive); });
  btnSelectRecent.addEventListener("click", selectRecentPoints);
  btnSelectRecent.textContent = "🕐 選取最近 " + RECENT_SELECT_COUNT + " 筆";

})();
</script>
</body>
</html>
