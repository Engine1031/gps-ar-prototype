<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>GPS AR 定點實驗</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; color: #fff;
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    overscroll-behavior: none;
  }
  #app { height: 100vh; display: flex; flex-direction: column; padding-top: 56px; box-sizing: border-box; }

  /* Tabs —— 修正1: 永遠固定在最上方，z-index 高於地圖/AR/彈窗，確保任何情況都能切換 */
  #tabs {
    position: fixed; top: 0; left: 0; right: 0; z-index: 3000; height: 56px;
    display: flex; background: #111; border-bottom: 2px solid #444;
  }
  .tab-btn {
    flex: 1; padding: 0 6px; font-size: 17px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    background: #111; color: #888; border: none; border-bottom: 4px solid transparent;
  }
  .tab-btn.active { color: #fff; border-bottom-color: #0f8; background: #1a1a1a; }

  .screen { flex: 1; overflow: hidden; position: relative; display: none; }
  .screen.active { display: block; }

  /* ---------- Register mode ---------- */
  #registerScreen { overflow-y: auto; padding: 16px; }
  .big-btn {
    display: block; width: 100%; padding: 22px; font-size: 22px; font-weight: bold;
    background: #0f8; color: #000; border: none; border-radius: 12px; margin-bottom: 12px;
  }
  .big-btn:active { background: #0c6; }
  .secondary-btn {
    display: block; width: 100%; padding: 16px; font-size: 18px; font-weight: bold;
    background: #333; color: #fff; border: 2px solid #666; border-radius: 12px; margin-bottom: 12px;
  }
  #registerStatus { min-height: 24px; font-size: 15px; color: #ff0; margin-bottom: 12px; white-space: pre-wrap; }
  #pointList { list-style: none; margin: 0; padding: 0; }
  #pointList li {
    background: #181818; border: 1px solid #444; border-radius: 10px;
    padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .point-info { font-size: 15px; line-height: 1.5; }
  .point-info b { font-size: 17px; color: #0f8; }
  .point-meta { color: #999; font-size: 12px; font-family: monospace; }
  .delete-btn { background: #a00; color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-size: 15px; flex: 0 0 auto; }
  .delete-btn:disabled { opacity: 0.4; }
  #emptyHint { color: #777; font-size: 14px; padding: 20px 0; text-align: center; }
  .sampling-badge { color: #ff0; font-weight: bold; }
  #storageUsage { color: #888; font-size: 12px; font-family: monospace; margin-bottom: 10px; }
  .point-thumb {
    display: block; margin-top: 6px; width: 56px; height: 56px;
    object-fit: cover; border-radius: 6px; border: 1px solid #444;
  }

  /* ---------- 標籤輸入 modal(與定位採樣解耦) ---------- */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.75);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box { background: #181818; border: 1px solid #444; border-radius: 14px; padding: 20px; width: 100%; max-width: 360px; }
  .modal-coords { font-size: 13px; color: #9f9; margin-bottom: 8px; }
  .modal-progress { font-size: 14px; color: #ff0; margin-bottom: 14px; min-height: 20px; }
  .modal-input {
    width: 100%; padding: 14px; font-size: 18px; background: #0d0d0d; color: #fff;
    border: 2px solid #666; border-radius: 10px; margin-bottom: 14px;
  }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button {
    flex: 1; margin-bottom: 0; padding: 14px; font-size: 17px; font-weight: bold;
    border-radius: 10px; border: 2px solid #666; background: #333; color: #fff; cursor: pointer;
  }
  /* 不可按時: 灰底灰字，文字仍清楚可見(絕不空白) */
  .modal-actions button:disabled { background: #222; color: #888; border-color: #444; cursor: not-allowed; opacity: 1; }
  #labelModalConfirm:not(:disabled) { background: #0f8; color: #000; border-color: #0f8; }

  /* ---------- 拍照(選填) ---------- */
  .modal-photo-row { margin-bottom: 14px; }
  #labelModalPhotoBtn {
    width: 100%; padding: 12px; font-size: 16px; font-weight: bold;
    background: #234; color: #fff; border: 2px solid #567; border-radius: 10px; cursor: pointer;
  }
  #labelModalPhotoBtn:disabled { opacity: 0.5; cursor: wait; }
  .modal-photo-preview { display: flex; align-items: center; gap: 12px; }
  .modal-photo-preview img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1px solid #666; }
  #labelModalPhotoRemove {
    padding: 8px 12px; font-size: 14px; font-weight: bold;
    background: #a00; color: #fff; border: none; border-radius: 8px; cursor: pointer;
  }

  /* 修正4(v2.4)+調整4(v2.5): 貨物記錄表單欄位多、超過畫面高度 —— 讓彈窗內容可垂直捲動，
     上緣讓開頂部固定頁籤列(56px)，底部保留裝置安全區(env(safe-area-inset-bottom))避免被瀏覽器底部
     工具列/home indicator 遮擋。「取消/儲存」按鈕列 sticky 固定在彈窗底部可見區內，永遠點得到。
     用 dvh(動態視窗高)才能扣掉行動瀏覽器動態工具列；不支援 dvh 的舊瀏覽器退回 vh。新增/編輯共用此彈窗。 */
  #cargoModalOverlay {
    align-items: flex-start;
    padding-top: 62px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  }
  #cargoModalOverlay .modal-box {
    max-height: calc(100vh - 82px);
    max-height: calc(100dvh - 82px - env(safe-area-inset-bottom, 0px));
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding-bottom: 0; /* 底部間距交給 sticky footer，footer 才能貼齊 bottom:0 */
  }
  #cargoModalOverlay .modal-actions {
    position: sticky; bottom: 0;
    background: #181818; margin: 0; padding: 12px 0 20px; z-index: 2;
  }

  /* ---------- View / AR mode ---------- */
  #viewScreen { background: #000; }
  #camera {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #000;
  }
  /* 圖層本身不吃點擊(讓相機/空白處穿透)，只有標籤元素開啟 pointer-events 供點擊看詳情 */
  #overlayLayer { position: absolute; inset: 0; pointer-events: none; }
  /* 熱區最小尺寸用 --min-touch(調整3)撐出，視覺文字大小獨立由距離分級 class 決定 */
  .marker {
    position: absolute; top: 42%; transform: translate(-50%, -50%);
    border: 2px solid #0f8; border-radius: 10px;
    padding: 6px 10px; color: #fff; font-size: 14px; font-weight: bold;
    white-space: nowrap; text-align: center; display: none;
    pointer-events: auto; cursor: pointer;
    box-sizing: border-box; min-width: var(--min-touch, 50px); min-height: var(--min-touch, 50px);
    flex-direction: column; align-items: center; justify-content: center;
  }
  .marker .marker-dist { display: block; font-size: 12px; font-weight: normal; color: #9f9; }

  /* 距離分級樣式(調整1) —— 顏色/縮放可在此微調 */
  .marker.dist-near { border-color: #0f8; background: rgba(0, 40, 20, 0.78); color: #fff; font-size: 14px; }
  .marker.dist-mid  { border-color: #fc0; background: rgba(50, 42, 0, 0.78); color: #ffe9a8; font-size: 12px; } /* ≈近的85% */
  .marker.dist-far  { border-color: #999; background: rgba(30, 30, 30, 0.72); color: #ddd; opacity: 0.6; font-size: 10px; } /* ≈近的70% */
  .marker.dist-near .marker-dist { color: #9f9; }
  .marker.dist-mid  .marker-dist { color: #fe8; }
  .marker.dist-far  .marker-dist { color: #bbb; }

  /* 調整1(v2.5): 正在微調的標籤「選定中」特效 —— 黃色加粗高亮外框 + 脈動呼吸燈，一眼看出正在調哪個 */
  .marker.marker-nudging {
    border-color: #ff0; border-width: 3px; color: #fff;
    background: rgba(60, 55, 0, 0.9); z-index: 40;
    animation: markerNudgePulse 1.1s ease-in-out infinite;
  }
  .marker.marker-nudging .marker-dist { color: #ffe58a; }
  @keyframes markerNudgePulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(255, 221, 0, 0.35); transform: translate(-50%, -50%) scale(1); }
    50%      { box-shadow: 0 0 16px 7px rgba(255, 221, 0, 0.85); transform: translate(-50%, -50%) scale(1.14); }
  }

  /* 群組標籤(調整2) —— 藍色底色區分，尺寸比照近距離 */
  .marker.marker-group { border-color: #4af; background: rgba(0, 25, 55, 0.88); color: #fff; font-size: 14px; }
  .marker.marker-group .marker-dist { color: #9cf; }

  /* ---------- AR 彈窗背景(調整1: 點半透明背景可關閉) ---------- */
  .ar-overlay {
    position: absolute; inset: 0; z-index: 30; display: none;
    align-items: center; justify-content: center; padding: 16px;
    background: rgba(0, 0, 0, 0.55);
  }
  .ar-overlay.active { display: flex; }

  /* ---------- AR 標籤詳情卡片 ---------- */
  #arDetailCard {
    width: 88%; max-width: 340px; max-height: 80vh; overflow-y: auto;
    background: rgba(10, 20, 15, 0.96); border: 2px solid #0f8; border-radius: 14px; padding: 16px;
  }
  #arDetailBody h3, #arDetailTitle { margin: 0 0 10px; font-size: 20px; color: #0f8; }
  /* 調整5: 操作列移到標題下方 */
  #arDetailActions { display: flex; gap: 6px; margin: 0 0 12px; flex-wrap: wrap; }
  .ar-detail-row {
    display: flex; justify-content: space-between; gap: 10px;
    padding: 6px 0; border-bottom: 1px solid #234; font-size: 14px;
  }
  .ar-detail-row span { color: #9c9; flex: 0 0 auto; }
  .ar-detail-row b { color: #fff; text-align: right; word-break: break-all; }
  .ar-detail-photo {
    display: block; width: 100%; margin-top: 12px; border-radius: 8px; border: 1px solid #444;
  }
  #arDetailActions button {
    flex: 1; box-sizing: border-box; min-height: var(--min-touch, 50px); padding: 10px 4px;
    font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; border: 1px solid #666;
  }
  #arDetailRename { background: #245; color: #fff; }
  #arDetailDelete { background: #622; color: #fff; border-color: #944; }
  #arDetailClose  { background: #333; color: #fff; }

  /* ---------- AR 群組清單彈窗(調整2) ---------- */
  #arGroupList {
    width: 88%; max-width: 340px; max-height: 80vh; overflow-y: auto;
    background: rgba(5, 15, 30, 0.96); border: 2px solid #4af; border-radius: 14px; padding: 16px;
  }
  #arGroupListClose {
    width: 100%; box-sizing: border-box; min-height: var(--min-touch, 50px); padding: 12px; margin-bottom: 12px;
    font-size: 16px; font-weight: bold; background: #333; color: #fff; border: 1px solid #666; border-radius: 8px; cursor: pointer;
  }
  .group-list-header { color: #9cf; font-size: 15px; font-weight: bold; margin-bottom: 10px; }
  .group-list-item {
    display: flex; justify-content: space-between; align-items: center; gap: 10px; width: 100%;
    box-sizing: border-box; min-height: var(--min-touch, 50px); padding: 10px 12px; margin-bottom: 8px;
    font-size: 15px; font-weight: bold; text-align: left;
    background: #1a2333; color: #fff; border: 1px solid #456; border-radius: 8px; cursor: pointer;
  }
  .group-list-item .group-list-dist { color: #9cf; font-weight: normal; flex: 0 0 auto; }

  /* 調整1: 懸浮收合控制面板(地圖 + AR 共用) —— fixed 定位，不被彈窗/卡片擠壓 */
  /* 只在所屬 screen 為 active(display:block) 時才會顯示(祖先 display:none 會整個隱藏) */
  .ctrl-toggle {
    position: fixed; top: 60px; right: 10px; z-index: 1200;
    width: 46px; height: 46px; border-radius: 23px; font-size: 22px; line-height: 1;
    background: rgba(20,20,20,0.9); color: #fff; border: 1px solid #888; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-panel {
    position: fixed; top: 112px; right: 10px; z-index: 1150;
    display: none; flex-direction: column; align-items: stretch; gap: 6px;
    max-width: 78vw; max-height: 70vh; overflow-y: auto;
    background: rgba(15,15,15,0.94); border: 1px solid #666; border-radius: 12px; padding: 10px;
  }
  .ctrl-panel.open { display: flex; }
  .ctrl-panel button {
    box-sizing: border-box; min-height: var(--min-touch, 50px);
    padding: 10px 14px; font-size: 14px; font-weight: bold;
    background: #222; color: #fff; border: 1px solid #666; border-radius: 8px; cursor: pointer;
  }
  #fovWrap { display: flex; align-items: center; gap: 6px; background: #222; border: 1px solid #666; border-radius: 8px; padding: 6px 10px; }
  #fovWrap label { font-size: 13px; }
  #fovInput { width: 50px; font-size: 15px; background: #111; color: #fff; border: 1px solid #666; border-radius: 4px; text-align: center; }

  #startOverlay {
    position: absolute; inset: 0; z-index: 20; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }
  #startOverlay p { color: #ccc; font-size: 14px; max-width: 320px; text-align: center; margin-bottom: 20px; }

  #orientationWarning {
    position: absolute; top: 54px; left: 8px; right: 8px; z-index: 5;
    background: rgba(180, 40, 0, 0.85); color: #fff; font-weight: bold; font-size: 13px;
    padding: 8px 10px; border-radius: 8px; display: none;
  }

  /* 修正6: 診斷資訊預設收合，點標題列展開 */
  #diagWrap { position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; }
  #diagToggle {
    background: rgba(0, 0, 0, 0.85); color: #0f0; font-family: "SF Mono", Menlo, monospace;
    font-size: 12px; font-weight: bold; padding: 8px 10px; cursor: pointer; border-top: 1px solid #050;
  }
  #diagnostics {
    max-height: 42vh; overflow-y: auto; display: none;
    background: rgba(0, 0, 0, 0.8); color: #0f0; font-family: "SF Mono", Menlo, monospace;
    font-size: 12px; line-height: 1.5; padding: 8px 10px; white-space: pre-wrap;
  }
  #diagWrap.open #diagnostics { display: block; }
  #diagnostics .warn { color: #f80; }

  /* ---------- 地圖預覽 ---------- */
  #mapScreen { padding: 0; }
  #leafletMap { position: absolute; inset: 0; background: #222; }
  /* 調整8: 地圖篩選提示條(低調但明顯) */
  #mapFilterStrip {
    position: absolute; top: 6px; left: 6px; z-index: 900; display: none;
    align-items: center; gap: 8px; max-width: calc(100% - 70px);
    background: rgba(180, 120, 0, 0.92); color: #fff; font-size: 12px; font-weight: bold;
    padding: 5px 8px; border-radius: 8px;
  }
  #mapFilterStrip.active { display: flex; }
  #btnClearMapFilter { background: #fff; color: #a60; border: none; border-radius: 6px; padding: 4px 8px; font-size: 12px; font-weight: bold; cursor: pointer; flex: 0 0 auto; }
  /* 調整9: 地圖點選目標移動貨物的提示條 */
  #mapMovePrompt {
    position: absolute; top: 6px; left: 6px; right: 6px; z-index: 950; display: none;
    flex-direction: column; gap: 6px;
    background: rgba(20, 60, 110, 0.95); color: #fff; font-size: 13px; font-weight: bold;
    padding: 8px 10px; border-radius: 8px;
  }
  #mapMovePrompt.active { display: flex; }
  #mapMoveBtns { display: flex; gap: 8px; }
  #mapMoveBtns button { flex: 1; box-sizing: border-box; min-height: 40px; font-size: 13px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; }
  #mapMoveUseList { background: #456; color: #fff; }
  #mapMoveCancel { background: #fff; color: #245; }
  #mapStatus {
    background: rgba(0, 0, 0, 0.7); color: #ff0; font-size: 12px;
    padding: 4px 8px; border-radius: 6px; max-width: 200px; text-align: right;
  }
  #mapStatus:empty { display: none; }
  .leaflet-popup-content a { color: #06c; }

  #btnClearMeasure { display: none; }
  #measureResultBar {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 500;
    background: rgba(0, 0, 0, 0.8); color: #ff0; font-size: 13px; font-weight: bold;
    padding: 8px 14px; border-radius: 8px; max-width: 90%; text-align: center; display: none;
  }
  .measure-selected-icon-inner {
    width: 22px; height: 22px; border-radius: 50%;
    background: #ffcc00; border: 3px solid #fff; box-shadow: 0 0 8px rgba(255, 204, 0, 0.9);
  }
  .measure-distance-tooltip {
    background: rgba(0, 0, 0, 0.85); color: #ffcc00; font-weight: bold; font-size: 13px; border: none;
  }
  .measure-distance-tooltip::before { display: none; }

  /* ---------- 編輯模式 ---------- */
  #btnSelectRecent { display: none; }
  .edit-selected-icon-inner {
    width: 22px; height: 22px; border-radius: 50%;
    background: #ff7b00; border: 3px solid #fff; box-shadow: 0 0 8px rgba(255, 123, 0, 0.9);
  }
  .edit-popup-status { font-size: 12px; color: #555; margin: 4px 0; }
  .edit-popup-status.edited { color: #c60; font-weight: bold; }
  .edit-popup-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .edit-popup-actions button {
    padding: 8px 10px; font-size: 13px; font-weight: bold;
    background: #333; color: #fff; border: 1px solid #666; border-radius: 6px; cursor: pointer;
  }
  .popup-edited-flag { color: #c60; font-weight: bold; font-size: 12px; }

  /* ---------- 貨物記錄 / 列表(v3) ---------- */
  .point-badge { font-size: 12px; font-weight: bold; padding: 1px 6px; border-radius: 6px; margin-left: 6px; }
  .point-badge.cargo { background: #5a3a00; color: #ffcf80; }
  .point-actions { display: flex; flex-direction: column; gap: 6px; flex: 0 0 auto; }
  /* 有在場貨物的地圖 marker: 藍底 + 📦 徽章 */
  .cargo-marker-inner {
    position: relative; width: 26px; height: 26px; border-radius: 50%;
    background: #1a73e8; border: 2px solid #fff; box-shadow: 0 0 6px rgba(26,115,232,0.9);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .cargo-marker-inner::after { content: "📦"; }
  .cargo-marker-inner .cargo-count {
    position: absolute; top: -7px; right: -7px; min-width: 16px; height: 16px; line-height: 16px;
    background: #d33; color: #fff; font-size: 10px; font-weight: bold; text-align: center; border-radius: 8px; padding: 0 3px;
  }
  /* popup / AR 詳情內的貨物區塊 */
  .cargo-section { margin-top: 10px; border-top: 1px solid #345; padding-top: 8px; }
  .cargo-section h4 { margin: 0 0 6px; font-size: 14px; color: #ffcf80; }
  .cargo-item { border: 1px solid #456; border-radius: 8px; padding: 6px 8px; margin-bottom: 6px; font-size: 13px; }
  .cargo-item .cargo-item-name { font-weight: bold; }
  .cargo-item .cargo-item-meta { color: #9ab; font-size: 12px; }
  .cargo-item img.cargo-thumb { display: block; margin-top: 4px; width: 48px; height: 48px; object-fit: cover; border-radius: 6px; border: 1px solid #456; }
  .cargo-ship-btn { margin-top: 4px; background: #642; color: #fff; border: 1px solid #a63; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
  .cargo-add-btn { width: 100%; background: #253; color: #cfc; border: 1px solid #486; border-radius: 8px; padding: 8px; font-size: 13px; font-weight: bold; cursor: pointer; }
  .cargo-empty { color: #789; font-size: 12px; margin-bottom: 6px; }
  .cargo-field-label { display: block; color: #9ab; font-size: 12px; margin: 2px 0; }
  .cluster-list-item { font-size: 13px; padding: 4px 0; border-bottom: 1px solid #345; }
  .cluster-list-item .cluster-cargo { color: #ffcf80; font-size: 12px; }

  /* 8 方向位置微調面板(v3: 適用所有點) */
  #offsetPanel {
    position: absolute; left: 8px; bottom: 8px; z-index: 600; display: none;
    background: rgba(0,0,0,0.85); border: 1px solid #567; border-radius: 12px; padding: 12px; width: 240px;
  }
  #offsetPanel.active { display: block; }
  #offsetPanelInfo { color: #ffcc99; font-size: 13px; line-height: 1.5; margin-bottom: 8px; }
  #offsetStepRow { display: flex; gap: 6px; margin-bottom: 8px; }
  #offsetStepRow button {
    flex: 1; padding: 8px 0; font-size: 13px; font-weight: bold; cursor: pointer;
    background: #223; color: #fff; border: 1px solid #456; border-radius: 6px;
  }
  #offsetStepRow button.active { background: #ff8c1a; color: #000; border-color: #ff8c1a; }
  #offsetPad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
  #offsetPad button {
    box-sizing: border-box; min-width: var(--min-touch, 50px); min-height: var(--min-touch, 50px);
    font-size: 18px; font-weight: bold; cursor: pointer; touch-action: manipulation; /* 修正2: 避免雙擊縮放 */

  }
  #offsetPad .pad-center { background: transparent; border: none; color: #789; font-size: 12px; cursor: default; }
  #offsetPanelClose {
    width: 100%; box-sizing: border-box; min-height: var(--min-touch, 50px); padding: 10px;
    font-size: 14px; font-weight: bold; background: #333; color: #fff; border: 1px solid #666; border-radius: 8px; cursor: pointer;
  }
  /* 通用微調 pad(供 AR 詳情卡片重用，調整5) */
  .nudge-step-row { display: flex; gap: 6px; margin: 6px 0; }
  .nudge-step-row button {
    flex: 1; padding: 8px 0; font-size: 13px; font-weight: bold; cursor: pointer;
    background: #223; color: #fff; border: 1px solid #456; border-radius: 6px;
  }
  .nudge-step-row button.active { background: #ff8c1a; color: #000; border-color: #ff8c1a; }
  .nudge-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 6px 0; }
  .nudge-pad button {
    box-sizing: border-box; min-width: var(--min-touch, 50px); min-height: var(--min-touch, 50px);
    font-size: 18px; font-weight: bold; cursor: pointer; touch-action: manipulation; /* 修正2: 避免雙擊縮放 */
    background: #234; color: #fff; border: 1px solid #567; border-radius: 8px;
  }
  .nudge-pad .pad-center { background: transparent; border: none; color: #789; font-size: 12px; cursor: default; }
  /* 調整5: AR 位置微調專注模式 —— 底部精簡半透明面板，不遮擋中央標籤 */

  #arNudgeFocusPanel .nudge-pad button { min-width: 50px; min-height: 50px; font-size: 16px; }
  #arNudgeFocusPanel .nudge-step-row { max-width: 260px; margin: 4px auto; }
  #arNudgeFocusDone {

  /* ---------- 顏色標籤 / 出貨模式(調整4) ---------- */
  #cargoColorRow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

<div id="app">

    <video id="camera" autoplay playsinline muted></video>

    <div id="arDetailOverlay" class="ar-overlay">

        <div id="arDetailActions">

          <button id="arDetailRename">✏️ 改名稱</button>
          <button id="arDetailDelete">🗑️ 刪除</button>
          <button id="arDetailClose">✕ 關閉</button>
        </div>
        <div id="arDetailBody"></div>
      </div>
    </div>

    <!-- 調整5: AR 位置微調專注模式(卡片退場，底部精簡面板) -->
    <div id="arNudgeFocus">
      <div id="arNudgeFocusInfo"></div>
      <div id="arNudgeFocusPanel"></div>
      <button id="arNudgeFocusDone">✓ 完成</button>
    </div>

    <div id="arGroupOverlay" class="ar-overlay">
      <div id="arGroupList">
        <button id="arGroupListClose">✕ 關閉</button>
        <div id="arGroupListBody"></div>
      </div>
    </div>

    <div id="renameModalOverlay" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-coords">修改地標名稱（只改名稱，不重新定位）</div>
        <input id="renameModalInput" type="text" class="modal-input" placeholder="請輸入新的名稱">
        <div class="modal-actions">
          <button id="renameModalCancel">取消</button>
          <button id="renameModalConfirm" disabled>請輸入名稱</button>
        </div>
      </div>
    </div>

    <!-- 調整1: 懸浮收合控制面板 -->
    <button id="viewCtrlToggle" class="ctrl-toggle">☰</button>
    <div id="viewTopBar" class="ctrl-panel">
      <button id="btnBack">← 回登記模式</button>
      <div id="fovWrap">
        <label for="fovInput">FOV°</label>
        <input id="fovInput" type="number" value="65" min="20" max="120" step="1">
      </div>

  <!-- ===================== 地圖預覽 ===================== -->
  <div id="mapScreen" class="screen">
    <div id="leafletMap"></div>
    <div id="mapFilterStrip"><span id="mapFilterText"></span><button id="btnClearMapFilter">清除篩選</button></div>
    <div id="mapMovePrompt">
      <span id="mapMoveText"></span>
      <div id="mapMoveBtns">
        <button id="mapMoveUseList">改用清單選擇</button>
        <button id="mapMoveCancel">取消</button>
      </div>
    </div>
    <!-- 調整1: 懸浮收合控制面板 -->
    <button id="mapCtrlToggle" class="ctrl-toggle">☰</button>
    <div id="mapTopBar" class="ctrl-panel">
      <button id="btnRefreshMapLocation">📍 重新整理目前位置</button>
      <button id="btnToggleMeasureMode">📏 量測模式：關閉</button>

      <button id="btnToggleCluster">🔗 聚合顯示：關閉</button>
      <button id="btnMapShipping">🚚 出貨模式：關閉</button>

    <div id="offsetPanel">

        <label>顏色

      </div>

    <div id="productsEmpty">目前沒有在場貨物</div>

</div>

<!-- 調整3(v2.5): app 內建自訂確認彈窗(取代 iOS 系統 window.confirm，無「禁止顯示對話方塊」選項) -->
<div id="confirmModalOverlay" class="modal-overlay">
  <div class="modal-box">

<div id="appVersion"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
(function () {
  "use strict";

  var STORAGE_KEY = "gpsArPoints_v1";
  var APP_VERSION = "2.5.0"; // 每次改版記得同步更新
  var RECENT_COLORS_KEY = "gpsArRecentColors_v1"; // 調整4: 最近使用顏色清單
  var RECENT_COLORS_MAX = 10;
  var DEFAULT_CARGO_COLOR = "#ff3b30";

  // ---- 可調參數 ----
  var AR_RENDER_THROTTLE_MS = 150;             // 修正1: updateAR() 畫面重繪節流間隔(ms)
  var HEADING_SMOOTHING_WINDOW = 5;            // 修正2: 羅盤圓周平滑取樣數
  var LABEL_COLLISION_THRESHOLD_PERCENT = 12;  // 修正3: 視為標籤重疊的水平距離門檻(佔畫面寬度 %)
  var LABEL_COLLISION_OFFSET_PX = 60;          // 修正3: 標籤重疊時垂直錯開距離(px)
  var LIVE_POSITION_SMOOTHING_WINDOW = 5;      // 檢視模式: 目前位置滑動視窗加權平均取樣數
  var LIVE_POSITION_JUMP_THRESHOLD_M = 30;     // 檢視模式: 新讀數與目前平滑值超過此距離視為真實移動，重置緩衝區
  var DEFAULT_MAP_CENTER = [25.0330, 121.5654]; // 地圖預覽: 完全沒有登記點也沒有目前位置時的預設中心(台北市)
  var MAP_MAX_ZOOM = 19;              // 調整1: OpenStreetMap 標準圖磚可用的最大 zoom
  var MAP_TILE_ERROR_THRESHOLD = 3;   // 調整1: 同一 zoom 等級累積這麼多次圖磚載入失敗，就自動退回上一級
  var RECENT_SELECT_COUNT = 5;        // 編輯模式: 「選取最近 N 筆」一鍵選取的數量
  var PHOTO_MAX_EDGE = 800;           // 調整2: 拍照壓縮 —— 長邊縮到此像素
  var PHOTO_JPEG_QUALITY = 0.6;       // 調整2: 拍照壓縮 —— JPEG 輸出品質
  // ---- AR 標籤分級/分群/熱區 可調參數 ----
  var DISTANCE_NEAR_THRESHOLD_M = 20;    // 調整1: 近距離門檻(公尺)
  var DISTANCE_MID_THRESHOLD_M = 50;     // 調整1: 中距離門檻(公尺)
  var DENSITY_GROUP_ANGLE_THRESHOLD = 3; // 調整2: 相對夾角差 < 此值(度)歸為同一群組
  var MIN_TOUCH_TARGET_PX = 50;          // 調整3: 可點擊元素最小熱區(px)
  var MAX_DISPLAY_DISTANCE_M = 150;      // 調整2(v2): AR 超過此距離不顯示標籤(診斷仍列出)
  var OFFSET_STEP_OPTIONS_M = [0.1, 0.5, 1, 2]; // 調整4(v2): 子點 8 方向調整的步進值選項(m)
  var OFFSET_STEP_DEFAULT_M = 0.5;       // 調整4(v2): 預設步進值

  document.getElementById("appVersion").textContent = "v" + APP_VERSION;
  document.documentElement.style.setProperty("--min-touch", MIN_TOUCH_TARGET_PX + "px"); // 調整3: 供 CSS 用

  function uid() {
    return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
  }
  function loadPoints() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch (e) { return []; }
  }
  function savePoints(points) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(points));
  }
  function isQuotaError(e) {
    return !!e && (e.name === "QuotaExceededError" || e.name === "NS_ERROR_DOM_QUOTA_REACHED" ||
      e.code === 22 || e.code === 1014);
  }
  // 調整2: localStorage 容量保護 —— 若寫入失敗(空間已滿)且該筆帶照片，
  // 自動移除照片再存一次，不讓整筆登記失敗。回傳是否成功存檔。
  function savePointsWithQuotaGuard(points, pointBeingAdded) {
    try {
      savePoints(points);
      return true;
    } catch (e) {
      if (isQuotaError(e) && pointBeingAdded && pointBeingAdded.photo) {
        delete pointBeingAdded.photo;
        try {
          savePoints(points);
          window.alert("儲存空間已滿，此筆將不含照片儲存。");
          return true;
        } catch (e2) { /* 連無照片版本都存不下，落到下方 */ }
      }
      window.alert("儲存空間已滿，無法儲存這筆登記，請先刪除部分資料再試。");
      return false;
    }
  }
  function toRad(d) { return d * Math.PI / 180; }
  function toDeg(r) { return r * 180 / Math.PI; }

  function haversineDistance(lat1, lng1, lat2, lng2) {
    var R = 6371000;
    var dLat = toRad(lat2 - lat1);
    var dLng = toRad(lng2 - lng1);
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLng / 2) * Math.sin(dLng / 2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function bearingTo(lat1, lng1, lat2, lng2) {
    var y = Math.sin(toRad(lng2 - lng1)) * Math.cos(toRad(lat2));
    var x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
      Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lng2 - lng1));
    var brng = toDeg(Math.atan2(y, x));
    return (brng + 360) % 360;
  }

  // normalize to -180..180
  function normalizeRelative(bearing, heading) {
    var diff = ((bearing - heading + 540) % 360) - 180;
    return diff;
  }

  // 修正2: 圓周平均 —— 0°/360° 邊界不能用一般算術平均，要先轉成 sin/cos 向量再平均
  function circularMeanDegrees(anglesDeg) {
    var sumSin = 0, sumCos = 0;
    anglesDeg.forEach(function (a) {
      sumSin += Math.sin(toRad(a));
      sumCos += Math.cos(toRad(a));
    });
    var meanDeg = toDeg(Math.atan2(sumSin / anglesDeg.length, sumCos / anglesDeg.length));
    return (meanDeg + 360) % 360;
  }

  // ===================== 共用 helpers =====================
  function byId(points, id) {
    for (var i = 0; i < points.length; i++) if (points[i].id === id) return points[i];
    return null;
  }
  // v3: 貨物記錄 —— parentId/offsetEast/offsetNorth 欄位保留於資料定義中(向下相容)，新資料不再使用。
  function activeCargo(p) {
    return (p && p.cargoRecords ? p.cargoRecords : []).filter(function (r) { return r.status === "active"; });
  }
  function hasActiveCargo(p) { return activeCargo(p).length > 0; }
  // 聚合清單用的一句話摘要
  function cargoSummary(p) {
    var act = activeCargo(p);
    if (act.length === 0) return "無在場貨物";
    return act.length + " 筆在場 · " + act[0].name + (act.length > 1 ? " 等" : "");
  }

  // v4: 所有地標的 active 貨物攤平成 [{rec, point}]
  function allActiveCargoFlat(points) {
    var out = [];
    points.forEach(function (p) {
      activeCargo(p).forEach(function (rec) { out.push({ rec: rec, point: p }); });
    });
    return out;
  }
  // v4: 目前所有 active 貨物用過的顏色(去重，回傳 [{colorHex, colorLabel}])
  function distinctActiveColors(points) {
    var seen = {}, out = [];
    allActiveCargoFlat(points).forEach(function (e) {
      var hex = e.rec.colorHex;
      if (!hex || seen[hex]) return;
      seen[hex] = true;
      out.push({ colorHex: hex, colorLabel: e.rec.colorLabel || "" });
    });
    return out;
  }
  function loadRecentColors() {
    try { return JSON.parse(localStorage.getItem(RECENT_COLORS_KEY)) || []; }
    catch (e) { return []; }
  }
  // 把一組顏色移到最近清單最前面(去重、限長)
  function pushRecentColor(colorHex, colorLabel) {
    if (!colorHex) return;
    var list = loadRecentColors().filter(function (c) { return c.colorHex !== colorHex; });
    list.unshift({ colorHex: colorHex, colorLabel: colorLabel || "" });
    if (list.length > RECENT_COLORS_MAX) list = list.slice(0, RECENT_COLORS_MAX);
    try { localStorage.setItem(RECENT_COLORS_KEY, JSON.stringify(list)); } catch (e) { /* 顏色清單非關鍵，滿了就算了 */ }
  }
  // v4: 一筆貨物是否含指定顏色
  function cargoHasColor(p, colorHex) {
    return activeCargo(p).some(function (r) { return r.colorHex === colorHex; });
  }

  // ===================== v5: 全域篩選狀態(商品頁籤 + 出貨模式共用，當次瀏覽有效) =====================
  var filterState = { landmarkId: null, colorHex: null };
  function filterIsActive() { return filterState.landmarkId != null || filterState.colorHex != null; }
  // 一筆記錄是否符合目前顏色篩選(顏色未設→全過；未上色記錄在有顏色篩選時一律不符合)
  function recordMatchesFilter(rec) {
    return filterState.colorHex == null || rec.colorHex === filterState.colorHex;
  }
  // 某地標是否通過篩選(地標維度 + 至少一筆 active 貨物符合顏色)
  function pointPassesFilter(p) {
    if (filterState.landmarkId != null && p.id !== filterState.landmarkId) return false;
    if (filterState.colorHex != null && !activeCargo(p).some(recordMatchesFilter)) return false;
    return true;
  }
  // 目前應顯示的 active 貨物(套用顏色篩選；修正3/調整8: popup/AR/商品清單共用)
  function filteredActiveCargo(p) {
    return activeCargo(p).filter(recordMatchesFilter);
  }
  // 篩選中要顯示的貨物數(有篩選用篩選後數量，否則全部)
  function visibleCargoCount(p) {
    return filterIsActive() ? filteredActiveCargo(p).length : activeCargo(p).length;
  }
  function filterSummaryText() {
    var parts = [];
    if (filterState.landmarkId != null) {
      var pts = loadPoints(); var lp = byId(pts, filterState.landmarkId);
      parts.push("地標：" + (lp ? lp.label : "?"));
    }
    if (filterState.colorHex != null) {
      var pts2 = loadPoints();
      var lbl = "";
      distinctActiveColors(pts2).forEach(function (c) { if (c.colorHex === filterState.colorHex) lbl = c.colorLabel; });
      parts.push("顏色：" + (lbl || filterState.colorHex));
    }
    return parts.join("　");
  }
  // 篩選變更後同步刷新所有相關畫面(地圖 markers/篩選條、出貨鈕、商品清單)
  function applyFilterChange() {
    if (typeof syncFilterUI === "function") syncFilterUI();
  }
  // v4: 把一筆貨物記錄從 fromPoint 搬到 toPoint(附 moveHistory)
  function moveCargoRecord(fromPointId, recId, toPointId) {
    var points = loadPoints();
    var from = byId(points, fromPointId), to = byId(points, toPointId);
    if (!from || !to || !from.cargoRecords) return false;
    var idx = -1;
    from.cargoRecords.forEach(function (r, i) { if (r.id === recId) idx = i; });
    if (idx === -1) return false;
    var rec = from.cargoRecords.splice(idx, 1)[0];
    if (!rec.moveHistory) rec.moveHistory = [];
    rec.moveHistory.push({ fromPointId: from.id, fromLabel: from.label, toPointId: to.id, toLabel: to.label, movedAt: new Date().toISOString() });
    if (!to.cargoRecords) to.cargoRecords = [];
    to.cargoRecords.push(rec);
    savePoints(points);
    return true;
  }

  // ===================== 調整3(v2.5): app 自訂確認彈窗(取代系統 window.confirm) =====================
  // 用法: appConfirm(訊息, onOk[, onCancel])。只有「確認」「取消」兩顆按鈕，點背景視同取消。

  function resolveAppConfirm(ok) {
    var f = ok ? confirmOnOk : confirmOnCancel;

        var nCargo = activeCargo(p).length;

      } else {

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;

  // 反變異數加權平均 —— accuracy 越小(越準)權重越高，經緯度分開加權平均。
  // 合併後的估計精度採用反變異數加權的標準統計式: sqrt(1 / Σ(1/accuracy_i^2))，
  // 樣本數越多、精度越好時，這個值會自然小於任何單一樣本的 accuracy。
  function weightedAverageSamples(samples) {
    var sumWeight = 0, sumLatW = 0, sumLngW = 0;
    samples.forEach(function (s) {
      var w = 1 / (s.accuracy * s.accuracy);
      sumWeight += w;
      sumLatW += s.lat * w;
      sumLngW += s.lng * w;
    });
    return {
      lat: sumLatW / sumWeight,
      lng: sumLngW / sumWeight,
      accuracy: 1 / Math.sqrt(sumWeight),
      sampleCount: samples.length
    };
  }

  // 需求3: 只要有 pendingRegistration 存在(標籤還沒確認，或已確認但背景取樣還沒完成)，
  // 「登記目前位置」按鈕就整個鎖住，避免兩組 watchPosition 同時在跑。
  function setRegisterButtonSampling(isLocked) {

    btnRegister.textContent = isLocked ? "⏳ 請等待上一筆定位完成..." : "📍 取得目前位置並登記地標";
  }

  var samplingState = {
    active: false,
    watchId: null,
    timeoutId: null,
    rawSamples: [],   // 所有收到的原始讀數，用於顯示進度與 fallback
    validSamples: []  // 通過 ACCURACY_DISCARD_THRESHOLD_M 門檻的讀數
  };

  function stopSampling() {
    if (samplingState.watchId != null) {
      navigator.geolocation.clearWatch(samplingState.watchId);
      samplingState.watchId = null;
    }
    if (samplingState.timeoutId != null) {
      clearTimeout(samplingState.timeoutId);
      samplingState.timeoutId = null;
    }
    samplingState.active = false;
  }

  // 調整2: 用 canvas 壓縮 —— 長邊縮到 PHOTO_MAX_EDGE、輸出 JPEG(品質 PHOTO_JPEG_QUALITY)，回傳 dataURL
  function compressImageFile(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var img = new Image();
        img.onload = function () {
          var scale = Math.min(1, PHOTO_MAX_EDGE / Math.max(img.width, img.height));
          var w = Math.max(1, Math.round(img.width * scale));
          var h = Math.max(1, Math.round(img.height * scale));
          var canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", PHOTO_JPEG_QUALITY));
        };
        img.onerror = function () { reject(new Error("圖片載入失敗")); };
        img.src = reader.result;
      };
      reader.onerror = function () { reject(new Error("檔案讀取失敗")); };
      reader.readAsDataURL(file);
    });
  }

  // 調整2: 標籤確認與背景取樣完成，兩件事誰先誰後都要能正確運作 ——
  // 只有當「標籤已確認」且「取樣已完成」都成立時，才正式寫入 localStorage。
  function tryFinalizeRegistration() {
    if (!pendingRegistration) return;
    if (!pendingRegistration.labelConfirmed || !pendingRegistration.samplingDone) return;

    var result = pendingRegistration.samplingResult;
    var point = {
      id: pendingRegistration.id, lat: result.lat, lng: result.lng, label: pendingRegistration.label,
      originalLat: result.lat, originalLng: result.lng, // 編輯模式: 保留 GPS 原始測量座標，lat/lng 之後可被人工修正
      accuracy: result.accuracy, sampleCount: result.sampleCount,
      createdAt: pendingRegistration.createdAt, status: "done"
    };
    if (pendingRegistration.photo) point.photo = pendingRegistration.photo; // 沒拍照就不存此欄位(向下相容)
    var points = loadPoints();
    points.push(point);
    var saved = savePointsWithQuotaGuard(points, point); // 空間滿時會自動改存無照片版本
    if (saved) {
      registerStatus.textContent = "已登記：" + point.label + (point.photo ? "（含照片）" : "") +
        "（±" + result.accuracy.toFixed(1) + "m，" + result.sampleCount + " 筆取樣）";
    } else {
      registerStatus.textContent = "儲存失敗，未能登記：" + point.label;
    }
    pendingRegistration = null;
    setRegisterButtonSampling(false);
    renderPointList();
  }

  function completeBackgroundSampling(samples) {
    var result = weightedAverageSamples(samples);
    if (!pendingRegistration) return; // 理論上不會發生(取消時會一併中止取樣)，防禦性檢查
    pendingRegistration.samplingResult = result;
    pendingRegistration.samplingDone = true;
    if (!pendingRegistration.labelConfirmed) {
      labelModalProgress.textContent = "定位完成（±" + result.accuracy.toFixed(1) + "m，" + result.sampleCount +
        " 筆取樣），請輸入標籤後按確認";
    }
    tryFinalizeRegistration();
  }

  function abortPendingRegistration(message) {
    pendingRegistration = null;
    setRegisterButtonSampling(false);
    closeLabelModal();
    registerStatus.textContent = message;
    renderPointList();
  }

  // 需求6: 收集到的樣本全部被門檻濾掉時，詢問使用者是否仍要用最後一筆將就登記。
  // 若同意，直接把該筆讀數當成單一樣本套用同一套加權平均公式(單樣本時公式會退化成該樣本自己)。
  function handleSamplingDone() {
    stopSampling();
    var valid = samplingState.validSamples;

    if (valid.length > 0) {
      completeBackgroundSampling(valid);
      return;
    }

    if (samplingState.rawSamples.length === 0) {
      abortPendingRegistration(
        "定位逾時，" + (SAMPLE_DURATION_MS / 1000) + " 秒內未取得任何 GPS 讀數，請確認定位權限或訊號後再試一次。"
      );
      return;
    }

    var lastRaw = samplingState.rawSamples[samplingState.rawSamples.length - 1];
    var useAnyway = window.confirm(
      "目前定位品質太差（可能在室內或訊號不佳），最後一筆讀數精度 ±" + lastRaw.accuracy.toFixed(1) +
      "m，是否仍要使用這筆讀數登記？"
    );
    if (!useAnyway) {
      abortPendingRegistration("已取消，未儲存。");
      return;
    }
    completeBackgroundSampling([lastRaw]);
  }

  function onSamplePosition(pos) {
    if (!samplingState.active) return;
    var sample = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: pos.coords.accuracy
    };
    samplingState.rawSamples.push(sample);
    if (sample.accuracy <= ACCURACY_DISCARD_THRESHOLD_M) {
      samplingState.validSamples.push(sample);
    }

    var bestAccuracy = samplingState.rawSamples.reduce(function (min, s) {
      return Math.min(min, s.accuracy);
    }, Infinity);

    // 需求2: 即時顯示取樣進度，輸入框開著的話同步顯示在輸入框內
    var progressText = "取樣中... 已收集 " + samplingState.rawSamples.length + " 筆（有效 " +
      samplingState.validSamples.length + " 筆），目前最佳精度 ±" + bestAccuracy.toFixed(1) + "m";
    registerStatus.textContent = progressText;
    labelModalProgress.textContent = progressText;

    // 需求5: 提前結束取樣
    if (samplingState.validSamples.length >= EARLY_STOP_MIN_SAMPLES) {
      var bestValidAccuracy = samplingState.validSamples.reduce(function (min, s) {
        return Math.min(min, s.accuracy);
      }, Infinity);
      if (bestValidAccuracy <= EARLY_STOP_BEST_ACCURACY_M) {
        handleSamplingDone();
      }
    }
  }

      return;
    }
    // 其他錯誤(逾時/暫時無法定位)先忽略，讓 watchPosition 有機會拿到下一筆，
    // 最終由 SAMPLE_DURATION_MS 逾時機制(handleSamplingDone)兜底處理。
  }

  // 完全不寫 localStorage；只有按「✓ 完成」(commitArNudge)才正式寫入 + 記一筆 editHistory(from=進入微調當下, to=完成當下)。
  // 任何其他方式離開(切點/切頁籤/離開檢視/關面板)都走 closeArNudgeFocus → 捨棄暫存，座標退回原始(因從未寫入)。
  function updateArNudgeFocusInfo() {
    var buf = viewState.nudgeBuffer;
    var p = byId(loadPoints(), viewState.nudgeFocusPointId);

  }
  function openArNudgeFocus(pointId) {

    viewState.nudgeFocusPointId = pointId;

    viewState.nudgeBuffer = { pointId: pointId, origLat: p.lat, origLng: p.lng, lat: p.lat, lng: p.lng };
    // 修正2(v2.4): 進入微調當下把平滑後的使用者位置凍結成固定基準點，微調期間所有標籤都用它
    // 計算方位角/距離，不再受背景 watchPosition 跳動干擾(朝向 currentHeading 仍即時更新)。
    viewState.frozenPosition = viewState.currentPosition
      ? { lat: viewState.currentPosition.lat, lng: viewState.currentPosition.lng, accuracy: viewState.currentPosition.accuracy }

  }
  // 按「✓ 完成」才正式落地
  function commitArNudge() {
    var buf = viewState.nudgeBuffer;
    if (buf && (buf.lat !== buf.origLat || buf.lng !== buf.origLng)) {
      var points = loadPoints();
      var p = byId(points, buf.pointId);
      if (p) {
        if (p.originalLat == null || p.originalLng == null) { p.originalLat = p.lat; p.originalLng = p.lng; }
        if (!p.editHistory) p.editHistory = [];
        p.editHistory.push({ editedAt: new Date().toISOString(), fromLat: buf.origLat, fromLng: buf.origLng, toLat: buf.lat, toLng: buf.lng });
        p.lat = buf.lat;
        p.lng = buf.lng;

  function nudgeBufferApply(dirKey, stepM) {
    var buf = viewState.nudgeBuffer;
    if (!buf) return;
    var dEast, dNorth;
    if (viewState.currentHeading == null) {
      // 尚無方位資料時退回固定地理方位
      var v = OFFSET_DIRECTIONS[dirKey];
      dEast = v[0] * stepM; dNorth = v[1] * stepM;
    } else {
      var bearing = (OFFSET_RELATIVE_ANGLE[dirKey] + viewState.currentHeading) % 360;
      dNorth = stepM * Math.cos(toRad(bearing)); // 方位角 0=正北、90=正東
      dEast = stepM * Math.sin(toRad(bearing));
    }
    buf.lat += dNorth / 111320;
    buf.lng += dEast / (111320 * Math.cos(toRad(buf.lat)));
  }

  // 來源切換(例如從 fallback 換成絕對方位)時清空緩衝區，避免不同來源的角度混在一起平均。
  function pushHeadingSample(rawHeadingDeg, sourceKey) {
    if (viewState.headingSourceKey !== sourceKey) {
      viewState.headingSourceKey = sourceKey;
      viewState.headingBuffer = [];
    }
    viewState.headingBuffer.push(rawHeadingDeg);
    if (viewState.headingBuffer.length > HEADING_SMOOTHING_WINDOW) {
      viewState.headingBuffer.shift();
    }
    viewState.currentHeading = circularMeanDegrees(viewState.headingBuffer);
  }
